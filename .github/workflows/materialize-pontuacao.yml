name: Materialize pontuação review

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: materialize-pontuacao-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  materialize:
    name: Materialize pontuação review
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Diagnose and materialize reviewed subject files
        shell: bash
        run: |
          sed -i 's/b952f8b8fb8eca403decd530bcf7ce1772271090606d34998325204b2d652f64/45e3ab4fb86ac7c19ffb43b2263f6339691fc8bcbb355180fcd79071c55386da/' .github/patch-pontuacao.py
          sed -i 's/08369c793f0ca82bf76b08b610d2cf2c2728329f48b2ad0a04549afef183404d/e5b3700269d17f1c34b480c96bb2057563bb81b771592821cc504cbf945fa6f5/' .github/patch-pontuacao.py
          sed -i 's/e8a75e19f2af66c9852e92df7ba7b8605cc85e5af84b70a60a532ab987107983/bd3d353625386e659dc2d2c023a069be4e60555f497455ffd55cfec18db1c9fd/' .github/patch-pontuacao.py
          sed -i 's/3288, "d3856d49679b161aec67d424b521e7bb5e3a6e506e7f6cf4bdef0a225411263f"/3312, "b163a2997739424106cf516230a6ac716214d677dbf76f7eec7f356da638dad6"/' .github/patch-pontuacao.py
          sed -i 's/len(payload) != 18288/len(payload) != 18312/' .github/patch-pontuacao.py
          sed -i 's/b6e3bcdd851ee2b09ff9cc0919a17537e686286408419583a6d57f7ddd0d1382/72e1ddcee75de93ff4fc9cb759f65c53da893e345ab19179d98f327d2e005b5e/' .github/patch-pontuacao.py
          sed -i 's/3377e783ac1ce2cf5b8c7fdf6512118c75e791f9784d0471d688e1882f9dac5/1d58dbd005cd22fff90ec60e66c07392b9b4fdf7370d5fad2569e23d71c2064d/' .github/patch-pontuacao.py

          python3 - <<'PY'
          from pathlib import Path

          path = Path('.github/patch-pontuacao.py')
          source = path.read_text(encoding='utf-8')
          replacements = {
              '"## 2. Integrações que a vírgula não deve romper"': '"## 2. Vírgula: integrações que não devem ser rompidas"',
              '"## 5. Orações subordinadas e pontuação"': '"### 4.3 Adjetivas restritivas e explicativas"',
              '"## 6. Conectores e marcadores discursivos"': '"### 4.3 Adjetivas restritivas e explicativas"',
              '"## 7. Ponto e vírgula, dois-pontos e ponto"': '"## 6. Ponto e vírgula"',
              '"## 8. Interrogação, exclamação e reticências"': '"## 8. Ponto, interrogação, exclamação e reticências"',
              '"## 11. Método de resolução"': '"## 11. Hierarquia dos incisos e efeitos de destaque"',
          }
          for old, new in replacements.items():
              if old not in source:
                  raise SystemExit(f'compatibility marker not found: {old}')
              source = source.replace(old, new, 1)

          needle = '        insertions = bundle["insertions"]\n'
          injection = '''        insertions = dict(bundle["insertions"])
          insertions["before_integracoes"] = insertions["before_integracoes"].replace(
              "## 2. Mapa de decisão: obrigatório, proibido, facultativo ou editorial",
              "### 1.1 Mapa de decisão: obrigatório, proibido, facultativo ou editorial",
              1,
          )
          insertions["before_subordinadas"] = insertions["before_subordinadas"].replace(
              "## 5. Estruturas correlativas", "### 4.3 Estruturas correlativas", 1
          )
          insertions["before_conectores"] = insertions["before_conectores"].replace(
              "## 6. A vírgula e a palavra `que`", "### 4.4 A vírgula e a palavra `que`", 1
          )
          insertions["before_ponto"] = insertions["before_ponto"].replace(
              "## 7. Marcadores discursivos ampliados", "### 5.3 Marcadores discursivos ampliados", 1
          )
          insertions["before_interrogacao"] = insertions["before_interrogacao"].replace(
              "## 8. Dois-pontos: anúncio legítimo ou ruptura indevida",
              "### 7.1 Dois-pontos: anúncio legítimo ou ruptura indevida",
              1,
          )
          '''
          if needle not in source:
              raise SystemExit('insertion mutation point not found')
          source = source.replace(needle, injection, 1)

          write_needle = '    path.write_text(text, encoding="utf-8")\n'
          write_injection = '''    text = text.replace(
              "### 4.3 Adjetivas restritivas e explicativas", "### 4.5 Adjetivas restritivas e explicativas", 1
          )
          text = text.replace("### 4.4 Adverbiais e reduzidas", "### 4.6 Adverbiais e reduzidas", 1)
          text = text.replace("### 4.5 Orações intercaladas", "### 4.7 Orações intercaladas", 1)
          text = text.replace(
              "## 11. Hierarquia dos incisos e efeitos de destaque",
              "## 12. Hierarquia dos incisos e efeitos de destaque",
              1,
          )
          text = text.replace(
              "## 12. Convenção editorial não é regra universal",
              "## 13. Convenção editorial não é regra universal",
              1,
          )
          text = text.replace(
              "## 13. Método para questões de pontuação e reescrita",
              "## 14. Método para questões de pontuação e reescrita",
              1,
          )
          path.write_text(text, encoding="utf-8")
          '''
          if write_needle not in source:
              raise SystemExit('write mutation point not found')
          source = source.replace(write_needle, write_injection, 1)
          path.write_text(source, encoding='utf-8')
          PY

          set +e
          python3 .github/patch-pontuacao.py 2>&1 | tee /tmp/pontuacao-diagnostic.log
          status=${PIPESTATUS[0]}
          set -e

          cp /tmp/pontuacao-diagnostic.log .github/pontuacao-diagnostic.log
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

          target='src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-gerais/lingua-portuguesa/pontuacao'
          git add .github/pontuacao-diagnostic.log
          if [ "$status" -eq 0 ]; then
            git add "$target/conteudo.md" "$target/cheat-sheet.md" "$target/questoes.json"
          fi

          if ! git diff --cached --quiet; then
            git commit -m 'ci: registra diagnóstico da revisão de pontuação'
            git push origin HEAD:${{ github.head_ref }}
          fi

          exit "$status"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run Astro checks
        run: npm run check

      - name: Build production site
        run: npm run build
