name: Report current general-content status in KV

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  report-kv:
    name: Persist current candidate status report
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Read KV and persist concise report
        shell: bash
        run: |
          curl --fail-with-body --silent --show-error 'https://kv.helio.me/adm' > /tmp/adm.json
          python3 - <<'PY'
          import json
          from pathlib import Path

          keys = [
              'tce-ma-2026-analista-administracao--classes-nominais-de-palavras',
              'tce-ma-2026-analista-administracao--classes-invariaveis-de-palavras',
              'tce-ma-2026-analista-administracao--subordinacao-oracoes-termos',
              'tce-ma-2026-analista-administracao--coesao-textual',
              'tce-ma-2026-analista-administracao--ortografia-oficial',
              'tce-ma-2026-analista-administracao--pontuacao',
              'tce-ma-2026-analista-administracao--concordancia-verbal-nominal',
              'tce-ma-2026-analista-administracao--regencia-verbal-nominal',
              'tce-ma-2026-analista-administracao--crase',
              'tce-ma-2026-analista-administracao--colocacao-pronominal',
              'tce-ma-2026-analista-administracao--significacao-palavras',
              'tce-ma-2026-analista-administracao--substituicao-palavras-trechos',
              'tce-ma-2026-analista-administracao--reorganizacao-oracoes-periodos',
              'tce-ma-2026-analista-administracao--reescrita-generos-formalidade',
          ]
          document = json.loads(Path('/tmp/adm.json').read_text(encoding='utf-8'))
          links = document.get('json', {}).get('links', {})
          report = {
              'version': document.get('version'),
              'items': {key: links.get(key) for key in keys},
          }
          Path('.github/kv-next-general-8-report.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/kv-next-general-8-report.json
          if ! git diff --cached --quiet; then
            git commit -m 'ci: registra estado atual dos conteúdos gerais no KV'
            git push origin HEAD:${{ github.head_ref }}
          fi
