name: Fix subtitulo competencias digitais publicas

on:
  push:
    branches:
      - agent/corrige-subtitulo-competencias-digitais-publicas

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fix duplicated heading
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path("src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-gerais/competencias-digitais-informatica-aplicada-setor-publico/competencias-digitais-publicas/conteudo.md")
          text = path.read_text(encoding="utf-8")
          old = "### 8.1 Fatores de circulação### 8.1 Fatores de circulação"
          if text.count(old) != 1:
              raise SystemExit(f"expected one duplicated heading, found {text.count(old)}")
          path.write_text(text.replace(old, "### 8.1 Fatores de circulação", 1), encoding="utf-8")
          PY

      - name: Unit tests
        run: npm run test:unit

      - name: Astro check
        run: npm run check

      - name: Production build
        run: npm run build

      - name: Commit validated correction
        shell: bash
        run: |
          rm .github/workflows/fix-subtitulo-competencias-digitais-publicas.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- \
            .github/workflows/fix-subtitulo-competencias-digitais-publicas.yml \
            src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-gerais/competencias-digitais-informatica-aplicada-setor-publico/competencias-digitais-publicas/conteudo.md
          git diff --cached --check
          git diff --cached --quiet && { echo "No changes to commit"; exit 1; }
          git commit -m "Corrige subtítulo de desordem informacional"
          git push origin HEAD:${GITHUB_REF_NAME}
