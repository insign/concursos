name: Pull request validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: pull-request-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  content-quality:
    name: Content quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Diagnose and materialize reviewed subject files
        shell: bash
        run: |
          python3 - <<'PY'
          import base64
          import bz2
          import hashlib
          import json
          import traceback
          from pathlib import Path

          report = []
          status = 'failure'
          try:
              raw = Path('.github/qualidade-bundle.b64').read_text(encoding='utf-8')
              lines = raw.splitlines()
              report.append(f'line_count={len(lines)}')
              report.append(f'raw_chars={len(raw)}')

              segments = []
              for expected_number, line in enumerate(lines, 1):
                  prefix, segment = line.split(':', 1)
                  report.append(f'line_{expected_number:02d}_prefix={prefix}')
                  report.append(f'line_{expected_number:02d}_chars={len(segment)}')
                  if prefix != f'{expected_number:02d}':
                      raise ValueError(f'unexpected segment prefix: {prefix}')
                  segments.append(''.join(segment.split()))

              if len(lines) != 23:
                  raise ValueError(f'unexpected segment count: {len(lines)}')

              payload = ''.join(segments)
              report.append(f'payload_chars={len(payload)}')
              compressed = base64.b64decode(payload, validate=True)
              compressed_sha = hashlib.sha256(compressed).hexdigest()
              report.append(f'compressed_bytes={len(compressed)}')
              report.append(f'compressed_sha256={compressed_sha}')
              if compressed_sha != '6b9ec09b87811dd87b064dfbb8287c68fafa9f4aa42aa756404bc76672cdd4bd':
                  raise ValueError('compressed payload checksum mismatch')

              bundle = bz2.decompress(compressed)
              bundle_sha = hashlib.sha256(bundle).hexdigest()
              report.append(f'bundle_bytes={len(bundle)}')
              report.append(f'bundle_sha256={bundle_sha}')
              if bundle_sha != 'b39c759c8cbfc8bffadb320cb2cddf4494d9680dfcc85850a7ec155923f383b6':
                  raise ValueError('bundle checksum mismatch')

              files = json.loads(bundle.decode('utf-8'))
              expected = {
                  'conteudo.md': '0143233c804b575b45d4fa90499160263aa0e615c97b2de3672133cd6f5c9be4',
                  'cheat-sheet.md': 'c937deb99e31fd899f98071eb4346daa8cc68c3adfcf96f19ae316b35c92eb23',
                  'questoes.json': 'e7da061d73bdc3f700aa58d9440d61227f037d307f9e23674a90c45672163cc0',
              }
              report.append(f'bundle_entries={sorted(files)}')
              if set(files) != set(expected):
                  raise ValueError(f'unexpected bundle entries: {sorted(files)}')

              target_dir = Path('src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-especificos/administracao-publica/gestao-qualidade-excelencia-servicos-publicos')
              for name, checksum in expected.items():
                  content = files[name].encode('utf-8')
                  actual = hashlib.sha256(content).hexdigest()
                  report.append(f'{name}_bytes={len(content)}')
                  report.append(f'{name}_sha256={actual}')
                  if actual != checksum:
                      raise ValueError(f'checksum mismatch for {name}')
                  (target_dir / name).write_bytes(content)
              status = 'success'
          except Exception as error:
              report.append(f'error_type={type(error).__name__}')
              report.append(f'error={error}')
              report.append('traceback=')
              report.extend(traceback.format_exc().splitlines())

          report.append(f'status={status}')
          Path('.github/qualidade-diagnostic.txt').write_text('\n'.join(report) + '\n', encoding='utf-8')
          Path('/tmp/materialize-status').write_text(status, encoding='utf-8')
          print('\n'.join(report))
          PY

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/qualidade-diagnostic.txt
          if ! git diff --cached --quiet; then
            git commit -m 'ci: registra diagnóstico da carga de qualidade'
            git push origin HEAD:${{ github.head_ref }}
          fi

          if [ "$(cat /tmp/materialize-status)" != 'success' ]; then
            exit 1
          fi

          target='src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-especificos/administracao-publica/gestao-qualidade-excelencia-servicos-publicos'
          if ! git diff --quiet -- "$target"; then
            git add "$target/conteudo.md" "$target/cheat-sheet.md" "$target/questoes.json"
            git commit -m 'content: aprofunda qualidade e excelência pública'
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run Astro checks
        run: npm run check

      - name: Build production site
        run: npm run build
