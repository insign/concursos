name: Pull request validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: pull-request-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  content-quality:
    name: Content quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Materialize reviewed subject files
        shell: bash
        run: |
          python3 - <<'PY'
          import base64
          import zlib
          from pathlib import Path

          root = Path('src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-especificos/administracao-publica/planejamento-direcao-processo-organizacional')
          files = {
              root / 'conteudo.md': [
                  '.github/plan-dir-content.1',
                  '.github/plan-dir-content.2',
              ],
              root / 'cheat-sheet.md': [
                  '.github/plan-dir-cheat.1',
              ],
              root / 'questoes.json': [
                  '.github/plan-dir-questions.1',
                  '.github/plan-dir-questions.2',
                  '.github/plan-dir-questions.3',
              ],
          }

          for target, parts in files.items():
              payload = ''.join(Path(part).read_text(encoding='utf-8').strip() for part in parts)
              target.write_bytes(zlib.decompress(base64.b64decode(payload)))
              print(f'materialized {target}: {target.stat().st_size} bytes')
          PY

          targets=(
            'src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-especificos/administracao-publica/planejamento-direcao-processo-organizacional/conteudo.md'
            'src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-especificos/administracao-publica/planejamento-direcao-processo-organizacional/cheat-sheet.md'
            'src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-especificos/administracao-publica/planejamento-direcao-processo-organizacional/questoes.json'
          )

          if ! git diff --quiet -- "${targets[@]}"; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add "${targets[@]}"
            git commit -m 'content: aprofunda planejamento e direção'
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run Astro checks
        run: npm run check

      - name: Build production site
        run: npm run build
