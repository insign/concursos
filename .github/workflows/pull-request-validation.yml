name: Pull request validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pull-request-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  content-quality:
    name: Content quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run Astro checks
        id: astro-check
        shell: bash
        run: |
          set +e
          npm run check 2>&1 | tee astro-check.log
          status=${PIPESTATUS[0]}
          echo "status=${status}" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Astro check log
        uses: actions/upload-artifact@v4
        with:
          name: astro-check-log
          path: astro-check.log

      - name: Fail when Astro check fails
        if: steps.astro-check.outputs.status != '0'
        run: exit 1

      - name: Build production site
        run: npm run build
