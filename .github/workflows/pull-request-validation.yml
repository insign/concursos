name: Pull request validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: pull-request-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  content-quality:
    name: Content quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Materialize reviewed question set
        shell: bash
        run: |
          python3 - <<'PY'
          import base64
          import hashlib
          import zlib
          from pathlib import Path

          parts = [
              '.github/comunicacao-questions.part1',
              '.github/comunicacao-questions.part2',
              '.github/comunicacao-questions.part3',
          ]
          payload = ''.join(Path(part).read_text(encoding='utf-8').strip() for part in parts)
          content = zlib.decompress(base64.b64decode(payload))
          expected = '797699fbc58c7c87bdf543e0ed10c6d22b8b224451fd3dd6409013af9bd71500'
          actual = hashlib.sha256(content).hexdigest()
          print('question set bytes:', len(content))
          print('question set sha256:', actual)
          if actual != expected:
              raise SystemExit('question set checksum mismatch')
          target = Path('src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-especificos/administracao-publica/comunicacao-processo-organizacional/questoes.json')
          target.write_bytes(content)
          PY

          target='src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-especificos/administracao-publica/comunicacao-processo-organizacional/questoes.json'
          if ! git diff --quiet -- "$target"; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add "$target"
            git commit -m 'content: fortalece questões de comunicação'
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run Astro checks
        run: npm run check

      - name: Build production site
        run: npm run build
