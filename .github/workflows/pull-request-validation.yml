name: Pull request validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: pull-request-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  content-quality:
    name: Content quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Materialize reviewed subject files
        shell: bash
        run: |
          python3 - <<'PY'
          import base64
          import bz2
          import hashlib
          import json
          from pathlib import Path

          parts = [
              '.github/planejamento-bundle.part1',
              '.github/planejamento-bundle.part2',
              '.github/planejamento-bundle.part3a',
              '.github/planejamento-bundle.part3b',
              '.github/planejamento-bundle.part3c',
              '.github/planejamento-bundle.part3d',
              '.github/planejamento-bundle.part3e1',
              '.github/planejamento-bundle.part3e2',
              '.github/planejamento-bundle.part4a',
              '.github/planejamento-bundle.part4b',
              '.github/planejamento-bundle.part4c',
          ]
          payload = ''.join(Path(part).read_text(encoding='utf-8').strip() for part in parts)
          if len(payload) != 25896:
              raise SystemExit(f'unexpected payload length: {len(payload)}')

          compressed = base64.b64decode(payload, validate=True)
          compressed_sha = hashlib.sha256(compressed).hexdigest()
          print('compressed bytes:', len(compressed))
          print('compressed sha256:', compressed_sha)
          if compressed_sha != '37c9f0075fdf816518e09ace90ba85122e850b0da41a59ef0917c36ec5c7b3d9':
              raise SystemExit('compressed payload checksum mismatch')

          bundle = bz2.decompress(compressed)
          bundle_sha = hashlib.sha256(bundle).hexdigest()
          print('bundle bytes:', len(bundle))
          print('bundle sha256:', bundle_sha)
          if bundle_sha != 'fba3807f8e8eb66f23c3b7cb118dd7dd8f16853f9bd91c56eec3e9e6b7c98325':
              raise SystemExit('bundle checksum mismatch')

          files = json.loads(bundle.decode('utf-8'))
          expected = {
              'conteudo.md': '26ab2fdfe05c18d659c1f04044edc79b313deb9309da1904499ae9e45d7297c4',
              'cheat-sheet.md': '22aa9efd3fffda380b3724e19d4f1f8cfdd16eaca7e1149634b789a95ccc4d31',
              'questoes.json': '3d12be82a44573b128890d8a8479003b5df6a2ba7668e5a3129e3617dbb2acb5',
          }
          if set(files) != set(expected):
              raise SystemExit(f'unexpected bundle entries: {sorted(files)}')

          target_dir = Path('src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-especificos/administracao-publica/planejamento-estrategico')
          for name, checksum in expected.items():
              content = files[name].encode('utf-8')
              actual = hashlib.sha256(content).hexdigest()
              print(name, len(content), actual)
              if actual != checksum:
                  raise SystemExit(f'checksum mismatch for {name}')
              (target_dir / name).write_bytes(content)
          PY

          target='src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-especificos/administracao-publica/planejamento-estrategico'
          if ! git diff --quiet -- "$target"; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add "$target/conteudo.md" "$target/cheat-sheet.md" "$target/questoes.json"
            git commit -m 'content: aprofunda planejamento estratégico'
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run Astro checks
        run: npm run check

      - name: Build production site
        run: npm run build
