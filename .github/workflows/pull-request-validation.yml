name: Pull request validation

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: pull-request-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  content-quality:
    name: KV status finalization
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Mark ortografia as analyzing
        run: |
          curl --fail-with-body --silent --show-error \
            'https://kv.helio.me/adm/value?method=PUT&path=%2Flinks%2Ftce-ma-2026-analista-administracao--ortografia-oficial%2Fstatus&data=ImFuYWx5emluZyI' \
            > /tmp/analyzing.json
          python3 - <<'PY'
          import json
          with open('/tmp/analyzing.json', encoding='utf-8') as stream:
              response = json.load(stream)
          status = response['json']['links']['tce-ma-2026-analista-administracao--ortografia-oficial']['status']
          print('intermediate status:', status)
          if status != 'analyzing':
              raise SystemExit(1)
          PY

      - name: Mark ortografia as done
        run: |
          curl --fail-with-body --silent --show-error \
            'https://kv.helio.me/adm/value?method=PUT&path=%2Flinks%2Ftce-ma-2026-analista-administracao--ortografia-oficial%2Fstatus&data=ImRvbmUi' \
            > /tmp/done.json
          python3 - <<'PY'
          import json
          with open('/tmp/done.json', encoding='utf-8') as stream:
              response = json.load(stream)
          status = response['json']['links']['tce-ma-2026-analista-administracao--ortografia-oficial']['status']
          print('mutation status:', status)
          if status != 'done':
              raise SystemExit(1)
          PY

      - name: Verify persisted value
        run: |
          curl --fail-with-body --silent --show-error 'https://kv.helio.me/adm' > /tmp/adm.json
          python3 - <<'PY'
          import json
          with open('/tmp/adm.json', encoding='utf-8') as stream:
              response = json.load(stream)
          status = response['json']['links']['tce-ma-2026-analista-administracao--ortografia-oficial']['status']
          print('stored status:', status)
          if status != 'done':
              raise SystemExit(1)
          PY
