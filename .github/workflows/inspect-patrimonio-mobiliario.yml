name: Inspect patrimônio mobiliário package

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  inspect:
    name: Inspect patrimônio mobiliário package
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Inspect package and persist report
        shell: bash
        run: |
          python3 .github/inspect-patrimonio-mobiliario.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/patrimonio-mobiliario-diagnostic.json
          if ! git diff --cached --quiet; then
            git commit -m 'ci: registra estrutura do pacote de patrimônio mobiliário'
            git push origin HEAD:${{ github.head_ref }}
          fi
