name: Fix Windows content rendering

on:
  push:
    branches:
      - agent/revisa-windows-arquivos-pastas

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fix path and table cells
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          base = Path('src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-gerais/competencias-digitais-informatica-aplicada-setor-publico/windows-arquivos-pastas')
          content_path = base / 'conteudo.md'
          cheat_path = base / 'cheat-sheet.md'
          bs = chr(92)

          content_lines = content_path.read_text(encoding='utf-8').splitlines()
          content_count = 0
          for index, line in enumerate(content_lines):
              if line.startswith('| caracteres reservados |'):
                  content_lines[index] = f'| caracteres reservados | não use `<`, `>`, `:`, `"`, `/`, `{bs}`, `?`, `*` nem a barra vertical |'
                  content_count += 1
          if content_count != 1:
              raise SystemExit(f'expected one content naming row, found {content_count}')
          content_path.write_text('\n'.join(content_lines) + '\n', encoding='utf-8')

          cheat_lines = cheat_path.read_text(encoding='utf-8').splitlines()
          fixed_lines = []
          path_fixed = False
          table_fixed = False
          broken_first = f'Exemplo: `C:{bs}Users{bs}Ana{bs}Documents'
          fixed_path = f'Exemplo: `C:{bs}Users{bs}Ana{bs}Documents{bs}relatorio.docx`'
          index = 0
          while index < len(cheat_lines):
              line = cheat_lines[index]
              if line == broken_first and index + 1 < len(cheat_lines) and cheat_lines[index + 1] == 'elatorio.docx`':
                  fixed_lines.append(fixed_path)
                  path_fixed = True
                  index += 2
                  continue
              if line.startswith('| proibidos |'):
                  fixed_lines.append(f'| proibidos | `<`, `>`, `:`, `"`, `/`, `{bs}`, `?`, `*` e barra vertical |')
                  table_fixed = True
                  index += 1
                  continue
              fixed_lines.append(line)
              index += 1
          if not path_fixed:
              raise SystemExit('broken cheat path anchor not found')
          if not table_fixed:
              raise SystemExit('cheat naming row not found')
          cheat_path.write_text('\n'.join(fixed_lines) + '\n', encoding='utf-8')
          PY

      - name: Unit tests
        run: npm run test:unit

      - name: Astro check
        run: npm run check

      - name: Production build
        run: npm run build

      - name: Commit validated correction
        shell: bash
        run: |
          rm .github/workflows/fix-windows-rendering.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- \
            .github/workflows/fix-windows-rendering.yml \
            src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-gerais/competencias-digitais-informatica-aplicada-setor-publico/windows-arquivos-pastas/conteudo.md \
            src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-gerais/competencias-digitais-informatica-aplicada-setor-publico/windows-arquivos-pastas/cheat-sheet.md
          git diff --cached --check
          git diff --cached --quiet && { echo "No changes to commit"; exit 1; }
          git commit -m "Corrige renderização do conteúdo de Windows"
          git push origin HEAD:${GITHUB_REF_NAME}
