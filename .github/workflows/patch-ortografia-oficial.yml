name: Patch ortografia oficial

on:
  push:
    branches:
      - agent/corrige-e-amplia-ortografia-oficial

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply editorial patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import json

          base = Path("src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-gerais/lingua-portuguesa/ortografia-oficial")
          content_path = base / "conteudo.md"
          cheat_path = base / "cheat-sheet.md"
          questions_path = base / "questoes.json"

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected exactly one anchor, found {count}")
              return text.replace(old, new, 1)

          content = content_path.read_text(encoding="utf-8")
          lexical_anchor = "Uma questão bem construída costuma usar formas plausíveis, não apenas erros evidentes. Compare, por exemplo, `descrição` × `discrição`, `comprimento` × `cumprimento` e `eminente` × `iminente`: todas existem, mas têm sentidos diferentes."
          lexical_block = lexical_anchor + """

          ### Famílias, sufixos e pares de sentido

          Alguns padrões ajudam a reduzir a memorização, desde que a base da palavra esteja clara:

          - substantivos abstratos derivados de adjetivos aparecem com frequência em `-ez` ou `-eza`: `rígido` → `rigidez`, `escasso` → `escassez`, `claro` → `clareza`;
          - verbos formados com o sufixo `-izar` escrevem-se com `z`: `fiscalizar`, `padronizar`, `legalizar`;
          - quando o `s` já pertence à base, ele se conserva: `análise` → `analisar`, `pesquisa` → `pesquisar`.

          Esses padrões não dispensam o VOLP: primeiro identifique a base e o processo de formação; depois confirme formas duvidosas.

          | Forma | Sentido útil em contexto administrativo |
          | --- | --- |
          | `sessão` / `seção` / `cessão` | reunião ou período / setor ou divisão / ato de ceder |
          | `deferir` / `diferir` | conceder / adiar ou distinguir |
          | `ratificar` / `retificar` | confirmar / corrigir |
          | `mandado` / `mandato` | ordem judicial / período ou poder conferido |
          | `descrição` / `discrição` | ato de descrever / reserva no comportamento |
          | `eminente` / `iminente` | destacado / prestes a ocorrer |
          | `infringir` / `infligir` | violar uma norma / aplicar pena ou castigo |
          | `tráfego` / `tráfico` | circulação / comércio ilícito |
          | `concerto` / `conserto` | apresentação musical ou acordo / reparo |
          | `cumprimento` / `comprimento` | saudação ou execução / extensão |

          Como todas essas formas existem, o contexto decide a escolha gráfica: `retificar o parecer` é corrigi-lo; `ratificar o parecer` é confirmá-lo.
          """
          content = replace_once(content, lexical_anchor, lexical_block, "lexical section")

          bem_old = """`Bem-` aparece em `bem-estar`, `bem-humorado` e `bem-vindo`, mas há lexicalizações como `benfeito`. `Mal-` aparece em `mal-estar` e `mal-humorado`, enquanto outras formações se aglutinam, como `malcriado` e `malfeito`.

          Não confunda palavra lexicalizada com sequência sintática: `malfeito`, mas “o trabalho foi mal feito”."""
          bem_new = """`Bem-` aparece em `bem-estar`, `bem-humorado` e `bem-vindo`, mas há lexicalizações como `benfeito`. `Mal-` aparece em `mal-estar` e `mal-humorado`, enquanto outras formações se aglutinam, como `malcriado` e `malfeito`.

          Não confunda registros de funções diferentes:

          - `benfeito` é substantivo, com sentido de benefício ou benfeitoria: “O benfeito promovido pelo município alcançou a comunidade”;
          - `bem-feito` é adjetivo composto: “O relatório está bem-feito”;
          - `bem feito` é sequência sintática, com `bem` modificando o particípio: “O relatório foi bem feito pela equipe”;
          - `malfeito` é forma lexicalizada, mas se escreve “o trabalho foi mal feito” quando `mal` funciona separadamente como advérbio.

          A semelhança sonora não torna essas grafias intercambiáveis: classe gramatical e contexto determinam a forma."""
          content = replace_once(content, bem_old, bem_new, "benfeito distinction")

          ref = "- UNIVERSIDADE FEDERAL DE LAVRAS. **Bem feito, bem-feito e benfeito (atualizado)**. Disponível em [orientação da UFLA](https://www.ufla.br/dcom/2014/03/11/dicas-de-portugues-bem-feito-bem-feito-e-benfeito-atualizado/). Acesso em: 18 jul. 2026."
          if ref in content:
              raise SystemExit("UFLA reference already present")
          content = content.rstrip() + "\n" + ref + "\n"
          content_path.write_text(content, encoding="utf-8")

          cheat = cheat_path.read_text(encoding="utf-8")
          cheat = replace_once(
              cheat,
              "- `bem-estar`, `mal-estar`, `bem-vindo`; mas `benfeito`, `malfeito`.",
              "- `bem-estar`, `mal-estar`, `bem-vindo`; atenção a `benfeito` (substantivo), `bem-feito` (adjetivo) e `bem feito` (advérbio + particípio).",
              "cheat benfeito",
          )
          letters_anchor = "- `x/ch`, `g/j`, `s/z/ç/ss`, `e/i`: use família quando ajudar e VOLP quando a regra não decidir."
          letters_block = letters_anchor + """
          - Padrões úteis: `rigidez`, `escassez`, `clareza`; `fiscalizar`, `padronizar`; `analisar`, `pesquisar`.

          ### Pares que a banca troca

          | Grafias | Distinção-relâmpago |
          | --- | --- |
          | `sessão` / `seção` / `cessão` | reunião / divisão / ato de ceder |
          | `deferir` / `diferir` | conceder / adiar ou distinguir |
          | `ratificar` / `retificar` | confirmar / corrigir |
          | `mandado` / `mandato` | ordem / período ou poder |
          | `eminente` / `iminente` | destacado / prestes |
          | `infringir` / `infligir` | violar / aplicar pena |
          | `tráfego` / `tráfico` | circulação / comércio ilícito |
          | `cumprimento` / `comprimento` | saudação ou execução / extensão |

          Todas as formas existem; escolha pelo sentido da frase.
          """
          cheat = replace_once(cheat, letters_anchor, letters_block, "cheat lexical pairs")
          cheat_path.write_text(cheat, encoding="utf-8")

          data = json.loads(questions_path.read_text(encoding="utf-8"))
          questions = data["questions"]
          by_id = {question["id"]: question for question in questions}
          if len(by_id) != len(questions):
              raise SystemExit("duplicate question IDs before patch")

          q084 = by_id["q084"]
          q084["revision"] = int(q084["revision"]) + 1
          q084["prompt"] = q084["prompt"].replace(
              "Quanto à ortografia oficial, assinale a opção correta.",
              "Quanto aos aspectos ortográficos e gramaticais, assinale a opção correta.",
          )
          if "aspectos ortográficos e gramaticais" not in q084["prompt"]:
              raise SystemExit("q084 prompt patch failed")

          q114 = by_id["q114"]
          q114.update({
              "revision": int(q114["revision"]) + 1,
              "prompt": "Em um relatório, foram empregados os trechos “o benfeito alcançou a comunidade”, “um parecer bem-feito” e “o parecer foi bem feito pela equipe”. Assinale a análise correta.",
              "options": [
                  {"id": "a", "text": "As três expressões devem ser escritas sem hífen, pois “bem” nunca integra compostos."},
                  {"id": "b", "text": "“Benfeito” é adjetivo e pode substituir “bem-feito” em qualquer contexto."},
                  {"id": "c", "text": "“Benfeito” é substantivo; “bem-feito” é adjetivo composto; “bem feito” é sequência sintática com advérbio e particípio."},
                  {"id": "d", "text": "Somente “bem feito” pode funcionar como substantivo, e as outras duas formas são antigas."},
                  {"id": "e", "text": "As três grafias são variantes livres e independem da classe gramatical."},
              ],
              "correctOptionId": "c",
              "explanation": "As três grafias têm funções distintas. “Benfeito” é substantivo, equivalente a benefício ou benfeitoria; “bem-feito” é adjetivo; “bem feito” mantém o advérbio separado do particípio. Fonte: questão autoral baseada no VOLP e na distinção registrada pela UFLA em https://www.ufla.br/dcom/2014/03/11/dicas-de-portugues-bem-feito-bem-feito-e-benfeito-atualizado/.",
          })

          q126 = by_id["q126"]
          q126.update({
              "revision": int(q126["revision"]) + 1,
              "prompt": "Em qual período a abreviatura final está pontuada de acordo com a norma?",
              "options": [
                  {"id": "a", "text": "A relação inclui nomes, cargos, datas etc.."},
                  {"id": "b", "text": "A relação inclui nomes, cargos, datas etc."},
                  {"id": "c", "text": "A relação inclui nomes, cargos, datas etc"},
                  {"id": "d", "text": "A relação inclui nomes, cargos, datas e.t.c."},
                  {"id": "e", "text": "A relação inclui nomes, cargos, datas etc..."},
              ],
              "correctOptionId": "b",
              "explanation": "O ponto que integra a abreviatura “etc.” também encerra o período; não se acrescenta um segundo ponto. Fonte: questão autoral baseada nas referências do conteúdo.",
          })

          q141 = by_id["q141"]
          q141["revision"] = int(q141["revision"]) + 1
          q141["options"][0]["text"] = "Os três são monossílabos tônicos terminados em a(s), e(s) ou o(s)."
          q141["correctOptionId"] = "a"
          q141["explanation"] = "“Trás”, “é” e “nós” são monossílabos tônicos. Terminam em a(s), e(s) ou o(s) e recebem acento pela mesma regra. Fonte: questão adaptada de Cebraspe/BNB/Analista Bancário/2018/Q950776/https://www.cebraspe.org.br/concursos/BANCO_DO_NORDESTE_18; adaptação: conversão do julgamento certo/errado para múltipla escolha e explicitação da classificação."

          q143 = by_id["q143"]
          q143["revision"] = int(q143["revision"]) + 1
          q143["prompt"] = q143["prompt"].replace("Um parecer contêm:", "Um parecer contém:")
          if "contêm:" in q143["prompt"]:
              raise SystemExit("q143 prompt patch failed")

          new_questions = [
              {
                  "id": "q144",
                  "revision": 1,
                  "prompt": "Em prova do TCE-MG, a banca examinou as formas “aquicultura”, “aqüicultura”, “catorze” e “quatorze”. Assinale a análise correta segundo a ortografia vigente.",
                  "options": [
                      {"id": "a", "text": "“Aquicultura” e “aqüicultura” são variantes livres, mas apenas “quatorze” é admitida."},
                      {"id": "b", "text": "O trema é obrigatório em “aqüicultura”, e as duas grafias do numeral são admitidas."},
                      {"id": "c", "text": "Escreve-se “aquicultura”, sem trema, e tanto “catorze” quanto “quatorze” são formas admitidas."},
                      {"id": "d", "text": "Apenas “catorze” é admitida, e o trema permanece porque o u é pronunciado."},
                      {"id": "e", "text": "Escreve-se “aquicultura”, mas o numeral só pode ser grafado como “quatorze” em textos oficiais."},
                  ],
                  "correctOptionId": "c",
                  "explanation": "O trema foi suprimido em palavras portuguesas e aportuguesadas, portanto se escreve “aquicultura”. O VOLP admite “catorze” e “quatorze”. Fonte: questão adaptada de Cebraspe/TCE-MG/Analista de Controle Externo/2026/https://www.qconcursos.com/questoes-de-concursos/provas/cespe-cebraspe-2026-tce-mg-analista-de-controle-externo-especialidade-direito/questoes; adaptação: recorte dos itens estritamente ortográficos e conversão em múltipla escolha.",
              },
              {
                  "id": "q145",
                  "revision": 1,
                  "prompt": "Assinale a única forma grafada de acordo com a ortografia oficial vigente.",
                  "options": [
                      {"id": "a", "text": "seminternato"},
                      {"id": "b", "text": "hiperssensibilidade"},
                      {"id": "c", "text": "contra-regra"},
                      {"id": "d", "text": "mão-de-obra"},
                      {"id": "e", "text": "autoanálise"},
                  ],
                  "correctOptionId": "e",
                  "explanation": "A forma correta é “autoanálise”: o prefixo termina em o e o segundo elemento começa por a, vogal diferente. As demais seriam “semi-internato”, “hipersensibilidade”, “contrarregra” e “mão de obra”. Fonte: questão oficial de Cebraspe/SEED-PR/Professor de Língua Portuguesa/2021/Q1689724/https://www.qconcursos.com/questoes-de-concursos/questoes/be70581d-7d.",
              },
              {
                  "id": "q146",
                  "revision": 1,
                  "prompt": "Em item do TC-DF, a forma verbal “vêm” concordava com o sujeito composto “o planejamento urbano e a gestão das cidades e áreas metropolitanas”. Por que o circunflexo está correto?",
                  "options": [
                      {"id": "a", "text": "Porque toda forma do verbo “vir” recebe acento circunflexo."},
                      {"id": "b", "text": "Porque “vêm” marca a terceira pessoa do plural e se distingue da forma singular “vem”."},
                      {"id": "c", "text": "Porque se trata de oxítona terminada em em."},
                      {"id": "d", "text": "Porque o verbo está no futuro do subjuntivo."},
                      {"id": "e", "text": "Porque o acento é facultativo quando há sujeito composto."},
                  ],
                  "correctOptionId": "b",
                  "explanation": "O circunflexo diferencia “vêm”, terceira pessoa do plural do presente de “vir”, de “vem”, terceira pessoa do singular. Fonte: questão adaptada de Cebraspe/TC-DF/Auditor de Controle Externo/2021/Q1699467/https://www.qconcursos.com/questoes-de-concursos/questoes/7aed5c2e-83; adaptação: conversão do julgamento certo/errado para múltipla escolha.",
              },
              {
                  "id": "q147",
                  "revision": 1,
                  "prompt": "Em prova da SEED-PR, foram comparados os vocábulos “línguas” e “países”. Assinale a análise correta segundo a classificação brasileira corrente.",
                  "options": [
                      {"id": "a", "text": "Ambos são paroxítonos; “línguas” é acentuado por terminar em ditongo oral, e “países”, pela regra do hiato com i tônico seguido de s."},
                      {"id": "b", "text": "Ambos são proparoxítonos e recebem acento pela mesma regra."},
                      {"id": "c", "text": "“Línguas” é oxítono, e “países” é proparoxítono."},
                      {"id": "d", "text": "Os dois acentos são diferenciais e poderiam ser omitidos."},
                      {"id": "e", "text": "“Países” é acentuado apenas porque termina em s."},
                  ],
                  "correctOptionId": "a",
                  "explanation": "Na análise brasileira corrente, as duas palavras são paroxítonas. “Línguas” termina em ditongo oral; em “países”, o i tônico forma hiato e vem seguido de s. Fonte: questão adaptada de Cebraspe/SEED-PR/Professor de Séries Iniciais/2021/Q1705473/https://www.qconcursos.com/questoes-de-concursos/questoes/6d3eddff-88; adaptação: simplificação das alternativas sem alterar o núcleo lógico.",
              },
              {
                  "id": "q148",
                  "revision": 1,
                  "prompt": "Em item do INSS, afirmou-se que o substantivo “bem-estar” poderia ser grafado como “bem estar”. Assinale a avaliação correta.",
                  "options": [
                      {"id": "a", "text": "A afirmação está correta, porque substantivos nunca recebem hífen."},
                      {"id": "b", "text": "A afirmação está correta apenas no plural."},
                      {"id": "c", "text": "A afirmação está errada: o substantivo composto “bem-estar” conserva o hífen."},
                      {"id": "d", "text": "A afirmação está errada porque a forma correta é “benestar”."},
                      {"id": "e", "text": "As duas grafias são variantes livres no Brasil."},
                  ],
                  "correctOptionId": "c",
                  "explanation": "“Bem-estar” é substantivo composto registrado com hífen; sua classe gramatical não autoriza a grafia separada “bem estar”. Fonte: questão adaptada de Cebraspe/INSS/Técnico do Seguro Social/2022/Q2638044/https://www.qconcursos.com/questoes-de-concursos/questoes/3dc2f1f7-76; adaptação: conversão do julgamento certo/errado para múltipla escolha.",
              },
              {
                  "id": "q149",
                  "revision": 1,
                  "prompt": "Em prova da Prefeitura de Camaçari, perguntou-se qual formação emprega o hífen pela mesma regra geral aplicada a “bem-estar”. Assinale a opção esperada pela banca.",
                  "options": [
                      {"id": "a", "text": "mal-humorado"},
                      {"id": "b", "text": "super-ricos"},
                      {"id": "c", "text": "sem-teto"},
                      {"id": "d", "text": "auto-organização"},
                      {"id": "e", "text": "cana-de-açúcar"},
                  ],
                  "correctOptionId": "c",
                  "explanation": "A banca aproximou os elementos “bem-” e “sem-”, que mantêm hífen nessas formações: “bem-estar” e “sem-teto”. As demais opções decorrem de regras ou registros diferentes. Fonte: questão oficial de Cebraspe/Prefeitura de Camaçari/Assistente Administrativo e outros cargos/2024/Q2352595/https://www.qconcursos.com/questoes-de-concursos/questoes/a33dc310-bb.",
              },
              {
                  "id": "q150",
                  "revision": 1,
                  "prompt": "Em prova da PC-PE, compararam-se “possíveis” e “panorâmica”. Assinale a análise correta.",
                  "options": [
                      {"id": "a", "text": "“Possíveis” é paroxítona terminada em ditongo; “panorâmica” é proparoxítona, portanto os acentos decorrem de regras distintas."},
                      {"id": "b", "text": "As duas são proparoxítonas e seguem a mesma regra."},
                      {"id": "c", "text": "As duas são paroxítonas terminadas em ditongo."},
                      {"id": "d", "text": "“Possíveis” recebe acento diferencial, e “panorâmica”, acento de hiato."},
                      {"id": "e", "text": "Nenhuma das duas deveria ser acentuada após o Acordo."},
                  ],
                  "correctOptionId": "a",
                  "explanation": "“Possíveis” é paroxítona terminada em ditongo oral; “panorâmica” tem tonicidade na antepenúltima sílaba e é proparoxítona. Fonte: questão adaptada de Cebraspe/PC-PE/Agente de Polícia/2024/Q2386574/https://www.qconcursos.com/questoes-de-concursos/questoes/22f99ed9-db; adaptação: isolamento do item ortográfico e conversão em múltipla escolha.",
              },
              {
                  "id": "q151",
                  "revision": 1,
                  "prompt": "Em questão da Itaipu Binacional, pediu-se uma palavra acentuada pela mesma regra de “eólica”. Assinale a opção correta.",
                  "options": [
                      {"id": "a", "text": "renovável"},
                      {"id": "b", "text": "elevará"},
                      {"id": "c", "text": "pássaros"},
                      {"id": "d", "text": "carvão"},
                      {"id": "e", "text": "ruído"},
                  ],
                  "correctOptionId": "c",
                  "explanation": "“Eólica” e “pássaros” são proparoxítonas, e todas as proparoxítonas recebem acento. Fonte: questão oficial de Cebraspe/Itaipu Binacional/Profissional de Nível Universitário Júnior/2024/Q2375094/https://www.qconcursos.com/questoes-de-concursos/questoes/6aa0ed2e-d0.",
              },
              {
                  "id": "q152",
                  "revision": 1,
                  "prompt": "Em prova do CBM-PA, a banca analisou os vocábulos “psicológica” e “únicas”. Assinale a classificação correta.",
                  "options": [
                      {"id": "a", "text": "Ambos são proparoxítonos e recebem acento agudo por essa regra."},
                      {"id": "b", "text": "Ambos são paroxítonos terminados em ditongo."},
                      {"id": "c", "text": "“Psicológica” é oxítona, e “únicas” é monossílabo tônico."},
                      {"id": "d", "text": "Os dois acentos são diferenciais."},
                      {"id": "e", "text": "Somente “psicológica” deveria ser acentuada."},
                  ],
                  "correctOptionId": "a",
                  "explanation": "A sílaba tônica é a antepenúltima em “psicológica” e “únicas”; ambas são proparoxítonas e recebem acento. Fonte: questão adaptada de Cebraspe/CBM-PA/Oficial do Corpo de Bombeiros/2024/Q2350464/https://www.qconcursos.com/questoes-militares/questoes/341e2ffe-b9; adaptação: isolamento da alternativa ortográfica correta.",
              },
              {
                  "id": "q153",
                  "revision": 1,
                  "prompt": "Em item da DPE-DF, propôs-se a grafia “Co-existem” como variante de “Coexistem”. Assinale a avaliação correta.",
                  "options": [
                      {"id": "a", "text": "A proposta está correta, porque todo prefixo terminado em vogal recebe hífen antes de vogal."},
                      {"id": "b", "text": "A proposta está correta apenas quando a palavra inicia período."},
                      {"id": "c", "text": "A proposta está errada: escreve-se “coexistem”, sem hífen."},
                      {"id": "d", "text": "A proposta está errada porque a forma correta é “coo-existem”."},
                      {"id": "e", "text": "As duas grafias são variantes livres previstas no Acordo."},
                  ],
                  "correctOptionId": "c",
                  "explanation": "O elemento “co-” aglutina-se ao segundo elemento; a grafia registrada é “coexistem”, sem hífen. Fonte: questão adaptada de Cebraspe/DPE-DF/Analista de Apoio à Assistência Judiciária — Administração/2022/Q1883768/https://www.qconcursos.com/questoes-de-concursos/provas/cespe-cebraspe-2022-dpe-df-analista-de-apoio-a-assistencia-judiciaria-administracao/questoes?page=2; adaptação: conversão do julgamento certo/errado para múltipla escolha.",
              },
          ]

          existing_ids = set(by_id)
          duplicate_new = existing_ids.intersection(question["id"] for question in new_questions)
          if duplicate_new:
              raise SystemExit(f"new question IDs already exist: {sorted(duplicate_new)}")
          questions.extend(new_questions)
          data["questionSetRevision"] = int(data.get("questionSetRevision", 0)) + 1

          final_ids = [question["id"] for question in questions]
          if len(final_ids) != len(set(final_ids)):
              raise SystemExit("duplicate question IDs after patch")
          if len(questions) != 70:
              raise SystemExit(f"expected 70 questions, found {len(questions)}")
          for question in questions:
              options = question.get("options", [])
              option_ids = [option.get("id") for option in options]
              if len(options) != 5 or len(option_ids) != len(set(option_ids)):
                  raise SystemExit(f"invalid options in {question['id']}")
              if question.get("correctOptionId") not in option_ids:
                  raise SystemExit(f"invalid correct option in {question['id']}")
              if "Fonte:" not in question.get("explanation", ""):
                  raise SystemExit(f"missing source in {question['id']}")

          questions_path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          PY

