name: Fix Windows content table

on:
  push:
    branches:
      - agent/revisa-windows-arquivos-pastas

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Fix table and commit
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-gerais/competencias-digitais-informatica-aplicada-setor-publico/windows-arquivos-pastas/conteudo.md')
          lines = path.read_text(encoding='utf-8').splitlines()
          count = 0
          for index, line in enumerate(lines):
              if line.startswith('| caracteres reservados |'):
                  lines[index] = '| caracteres reservados | não use `<`, `>`, `:`, `"`, `/`, barra invertida, `?`, `*` nem barra vertical |'
                  count += 1
          if count != 1:
              raise SystemExit(f'expected one row, found {count}')
          path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
          PY
          rm .github/workflows/fix-windows-content-table.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- .github/workflows/fix-windows-content-table.yml src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-gerais/competencias-digitais-informatica-aplicada-setor-publico/windows-arquivos-pastas/conteudo.md
          git diff --cached --check
          git commit -m "Corrige tabela de nomes reservados no Windows"
          git push origin HEAD:${GITHUB_REF_NAME}
