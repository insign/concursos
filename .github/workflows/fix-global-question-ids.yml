name: Fix global question IDs

on:
  push:
    branches:
      - agent/corrige-ids-competencias-digitais

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Mark Windows analysis as analyzing in KV
        shell: bash
        run: |
          curl --fail --silent --show-error --location \
            'https://kv.helio.me/adm/value?method=PUT&path=%2Flinks%2Ftce-ma-2026-analista-administracao--windows-arquivos-pastas&data=eyJwYXRoIjoiL2NvbmN1cnNvcy90Y2UtbWEtMjAyNi1hbmFsaXN0YS1hZG1pbmlzdHJhY2FvL3dpbmRvd3MtYXJxdWl2b3MtcGFzdGFzLyIsInN0YXR1cyI6ImFuYWx5emluZyJ9' \
            --output /tmp/kv-windows-analyzing.json
          jq -e '.json.links["tce-ma-2026-analista-administracao--windows-arquivos-pastas"].status == "analyzing"' /tmp/kv-windows-analyzing.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Renumber only the recently added competency questions
        shell: bash
        run: |
          python3 <<'PY'
          from collections import defaultdict
          from pathlib import Path
          import json
          import re

          root = Path("src/content/assuntos")
          target = Path("src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-gerais/competencias-digitais-informatica-aplicada-setor-publico/competencias-digitais-publicas/questoes.json")
          windows = Path("src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-gerais/competencias-digitais-informatica-aplicada-setor-publico/windows-arquivos-pastas/questoes.json")
          old_ids = [f"q{number}" for number in range(3879, 3909)]
          old_set = set(old_ids)

          def scan():
              occurrences = defaultdict(list)
              max_number = 0
              for path in sorted(root.rglob("questoes.json")):
                  data = json.loads(path.read_text(encoding="utf-8"))
                  for question in data.get("questions", []):
                      qid = question.get("id")
                      if not isinstance(qid, str):
                          raise SystemExit(f"invalid question id in {path}: {qid!r}")
                      occurrences[qid].append(path)
                      match = re.fullmatch(r"q(\d+)", qid)
                      if match:
                          max_number = max(max_number, int(match.group(1)))
              return occurrences, max_number

          occurrences, max_number = scan()
          for qid in old_ids:
              paths = occurrences.get(qid, [])
              if target not in paths or windows not in paths:
                  raise SystemExit(f"{qid} does not reproduce the confirmed target/Windows collision: {[str(path) for path in paths]}")

          data = json.loads(target.read_text(encoding="utf-8"))
          by_id = {question["id"]: question for question in data["questions"]}
          if len(by_id) != len(data["questions"]):
              raise SystemExit("target file already has internal duplicate IDs")
          if not old_set.issubset(by_id):
              raise SystemExit(f"target does not contain all expected IDs: {sorted(old_set.difference(by_id))}")

          new_ids = [f"q{max_number + offset}" for offset in range(1, len(old_ids) + 1)]
          if set(new_ids).intersection(occurrences):
              raise SystemExit("computed target range is not globally free")
          mapping = dict(zip(old_ids, new_ids))
          for question in data["questions"]:
              if question["id"] in mapping:
                  question["id"] = mapping[question["id"]]
          data["questionSetRevision"] = int(data.get("questionSetRevision", 0)) + 1

          lines = ["{", f'  "schemaVersion": {int(data["schemaVersion"])},', f'  "questionSetRevision": {int(data["questionSetRevision"])},', '  "questions": [']
          for index, question in enumerate(data["questions"]):
              suffix = "," if index < len(data["questions"]) - 1 else ""
              lines.append("    " + json.dumps(question, ensure_ascii=False, separators=(",", ":")) + suffix)
          lines.extend(["  ]", "}"])
          target.write_text("\n".join(lines) + "\n", encoding="utf-8")

          after, _ = scan()
          for qid in new_ids:
              paths = after.get(qid, [])
              if paths != [target]:
                  raise SystemExit(f"new id {qid} is not unique to target: {[str(path) for path in paths]}")
          target_after = json.loads(target.read_text(encoding="utf-8"))
          target_ids = {question["id"] for question in target_after["questions"]}
          if target_ids.intersection(old_set):
              raise SystemExit("old conflicting IDs remain in target")

          other_duplicates = sorted(qid for qid, paths in after.items() if len(paths) > 1)
          proof = {
              "oldRange": [old_ids[0], old_ids[-1]],
              "newRange": [new_ids[0], new_ids[-1]],
              "count": len(new_ids),
              "questionSetRevision": data["questionSetRevision"],
              "unrelatedHistoricalDuplicateCount": len(other_duplicates),
          }
          Path("/tmp/question-id-proof.json").write_text(json.dumps(proof, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(json.dumps(proof, ensure_ascii=False))
          PY

      - name: Unit tests
        run: npm run test:unit

      - name: Astro check
        run: npm run check

      - name: Production build
        run: npm run build

      - name: Commit validated correction
        shell: bash
        run: |
          cat /tmp/question-id-proof.json
          rm .github/workflows/fix-global-question-ids.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- \
            .github/workflows/fix-global-question-ids.yml \
            src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-gerais/competencias-digitais-informatica-aplicada-setor-publico/competencias-digitais-publicas/questoes.json
          git diff --cached --check
          git diff --cached --quiet && { echo "No changes to commit"; exit 1; }
          git commit -m "Corrige colisão de IDs com o banco de Windows"
          git push origin HEAD:${GITHUB_REF_NAME}
