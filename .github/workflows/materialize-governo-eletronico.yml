name: Materialize governo eletrônico review

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: materialize-governo-eletronico-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  materialize:
    name: Materialize governo eletrônico review
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Materialize reviewed subject files
        shell: bash
        run: |
          set +e
          python3 .github/patch-governo-eletronico.py > /tmp/governo-eletronico-patch.log 2>&1
          status=$?
          set -e
          cat /tmp/governo-eletronico-patch.log

          if [ "$status" -ne 0 ]; then
            cp /tmp/governo-eletronico-patch.log .github/governo-eletronico-diagnostic.txt
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add .github/governo-eletronico-diagnostic.txt
            if ! git diff --cached --quiet; then
              git commit -m 'ci: registra diagnóstico de governo eletrônico'
              git push origin HEAD:${{ github.head_ref }}
            fi
            exit "$status"
          fi

          target='src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-especificos/governo-eletronico-transparencia/governo-eletronico'
          if ! git diff --quiet -- "$target"; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add "$target/conteudo.md" "$target/cheat-sheet.md" "$target/questoes.json"
            git commit -m 'content: aprofunda governo eletrônico'
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run Astro checks
        run: npm run check

      - name: Build production site
        run: npm run build
