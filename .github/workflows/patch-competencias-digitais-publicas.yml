              question("q3880", "q3622166", "Um plano afirma seguir os quatro eixos estruturantes da PNED. Qual título está fora da enumeração legal?", [("A", "Inclusão Digital."), ("B", "Matemática Digital."), ("C", "Educação Digital Escolar."), ("D", "Pesquisa e Desenvolvimento em TICs.")], "B", "FUNDATEC, Prefeitura de Tangará da Serra, Professor de História, 2025, Q3622166", "Matemática Digital não é eixo estruturante; os quatro eixos são Inclusão Digital, Educação Digital Escolar, Capacitação e Especialização Digital e P&D em TICs."),
              question("q3881", "q3148217", "Segundo a PNED, o objetivo do eixo Educação Digital Escolar é:", [("A", "Restringir a educação digital ao ensino médio."), ("B", "Substituir o currículo por ensino exclusivamente tecnológico."), ("C", "Oferecer somente alfabetização operacional em plataformas."), ("D", "Inserir a educação digital em todos os níveis e modalidades, com letramento digital e informacional e aprendizagem de computação e outras competências.")], "D", "FUNDATEC, Prefeitura de Iraí, Professor de História, 2024, Q3148217", "A lei adota alcance amplo, articulado à BNCC, sem substituir o currículo por tecnologia."),
              question("q3882", "q3653433", "Quanto à relação entre a PNED e outras políticas públicas, assinale a correta.", [("A", "A PNED revoga políticas estaduais e municipais."), ("B", "A execução é exclusiva da União."), ("C", "A PNED articula e complementa outras políticas relacionadas à educação digital."), ("D", "Os entes locais perdem autonomia para formular ações próprias.")], "C", "FUNDATEC, Prefeitura de Marau, Professor de Artes, 2025, Q3653433", "A PNED é instância de articulação e não substitui políticas nacionais, estaduais, distritais ou municipais."),
              question("q3883", "q4207980", "Qual descrição corresponde ao pensamento computacional na PNED?", [("A", "Compreender, analisar, modelar e resolver problemas por meio da criação ou adaptação de algoritmos."), ("B", "Memorizar comandos de uma linguagem de programação."), ("C", "Converter materiais impressos em arquivos digitais."), ("D", "Usar somente dispositivos conectados à internet.")], "A", "FUNDATEC, Prefeitura de Venâncio Aires, Orientador Educacional, 2025, Q4207980", "Pensamento computacional é capacidade metódica de formular e resolver problemas, não mero domínio operacional ou programação obrigatória."),
              question("q3884", "q3429295", "Analise: I. Educação Digital Escolar busca inserir educação digital nos ambientes escolares. II. Capacitação e Especialização Digital destina-se exclusivamente a professores. III. P&D em TICs busca tecnologias acessíveis e inclusivas. Está correto o que se afirma em:", [("A", "I, apenas."), ("B", "II, apenas."), ("C", "I e III, apenas."), ("D", "I, II e III.")], "C", "FUNDATEC, IFSC, Professor EBTT — Designer de Produto, 2024, Q3429295", "I e III reproduzem os objetivos legais; o eixo de capacitação é mais amplo e alcança formação profissional e servidores, não somente professores."),
              question("q3885", "q4075215", "Assinale a formulação correta sobre a estrutura da PNED.", [("A", "Possui três eixos idênticos aos da BNCC Computação."), ("B", "Concentra-se somente em infraestrutura escolar."), ("C", "Exclui capacitação para o mundo do trabalho."), ("D", "Possui quatro eixos: inclusão; educação digital escolar; capacitação e especialização; P&D em TICs.")], "D", "FUNDATEC, Prefeitura de Estância Velha, Professor de Artes, 2025, Q4075215", "A enumeração correta contém quatro eixos e não se confunde com os três eixos da BNCC Computação."),
              question("q3886", "q3948335", "Na PNED, cultura digital envolve principalmente:", [("A", "Compreensão dos impactos das tecnologias e participação crítica, ética e responsável diante de mídias e conteúdos."), ("B", "Treinamento para consumo passivo de plataformas."), ("C", "Aprendizagem exclusiva de hardware."), ("D", "Substituição automática de metodologias não digitais.")], "A", "FUNDATEC, Prefeitura de Lajeado, Professor de Artes, 2025, Q3948335", "Cultura digital não é mera operação: inclui impactos sociais, multiplicidade de mídias e postura crítica e responsável."),
              question("q3887", "q3221062", "Qual medida não corresponde aos objetivos e estratégias da PNED?", [("A", "Ampliar acesso e conectividade."), ("B", "Formar profissionais em competências digitais."), ("C", "Promover pesquisa e inovação em TICs."), ("D", "Reduzir obrigatoriamente a carga horária das disciplinas tradicionais.")], "D", "FUNDATEC, Prefeitura de Jari, Professor dos Anos Iniciais, 2024, Q3221062", "A PNED promove inclusão, formação e inovação, mas não determina redução geral de carga horária de outros componentes."),
              question("q3888", "q2627079", "Entre as opções, qual não é eixo estruturante da PNED?", [("A", "Inclusão Digital."), ("B", "Educação Digital Escolar."), ("C", "Ferramentas de diagnóstico."), ("D", "Capacitação e Especialização Digital.")], "C", "FUNDATEC, IF-RS, Professor de Biologia, 2023, Q2627079", "Ferramentas de diagnóstico aparecem como estratégia em determinados eixos, não como eixo estruturante autônomo."),
              question("q3889", "q3300988", "Qual afirmação é compatível com a Lei nº 14.533/2023?", [("A", "A PNED torna robótica disciplina obrigatória e isolada em todas as escolas."), ("B", "A política combina inclusão digital, competências para o trabalho e incentivo à pesquisa e inovação."), ("C", "A política começa apenas no ensino médio."), ("D", "A política elimina a formação docente continuada.")], "B", "FUNDATEC, Prefeitura de Cerro Grande, cargos docentes, 2025, Q3300988", "A PNED articula inclusão, educação escolar, capacitação profissional e P&D; não cria disciplina única obrigatória nem restringe a atuação ao ensino médio."),
              question("q3890", "q3819850", "A implementação da PNED na educação básica deve buscar:", [("A", "Restringir recursos digitais para preservar métodos tradicionais."), ("B", "Substituir professores por sistemas de IA."), ("C", "Ampliar acesso e conectividade e desenvolver competências digitais de estudantes e profissionais."), ("D", "Adotar exclusivamente softwares fechados.")], "C", "FUNDATEC, Prefeitura de Agudo, Professor dos Anos Iniciais, 2026, Q3819850", "A política combina acesso material com desenvolvimento de competências; não prescreve substituição docente ou exclusividade tecnológica."),
              question("q3891", "q3799718", "Constituem estratégias prioritárias da Educação Digital Escolar:", [("A", "Formação docente em competências digitais e projetos de lógica, algoritmos, ética, letramento midiático e cidadania digital."), ("B", "Uso irrestrito de dispositivos sem mediação pedagógica."), ("C", "Eliminação de acessibilidade para simplificar plataformas."), ("D", "Concentração exclusiva na manutenção de equipamentos.")], "A", "FUNDATEC, Prefeitura de Nova Ramada, Professor de Artes, 2024, Q3799718", "A PNED integra formação, cidadania, pensamento computacional, ética e letramento midiático, em vez de reduzir a política a infraestrutura."),
              question("q3892", "q4393488", "Qual definição está corretamente associada a um dos cinco campos da Educação Digital Escolar?", [("A", "Mundo digital: participação consciente, ética e democrática em mídias."), ("B", "Direitos digitais: aprendizagem exclusiva sobre hardware."), ("C", "Pensamento computacional: proteção de dados e conectividade segura."), ("D", "Tecnologia assistiva: recursos, métodos, estratégias, práticas e serviços voltados à funcionalidade e inclusão.")], "D", "FUNDATEC, Prefeitura, Professor, 2023, Q4393488", "A alternativa D reproduz o núcleo da tecnologia assistiva; as demais trocam as definições dos campos."),
              question("q3893", "q4243584", "À luz da Resolução CNE/CEB nº 2/2025, o uso de dispositivos digitais em espaços escolares deve ser:", [("A", "irrestrito, porque a resolução contém apenas recomendações sem efeito normativo."), ("B", "pedagogicamente mediado, contextualizado e orientado por responsabilidade ética."), ("C", "uniforme para todas as etapas e componentes."), ("D", "limitado a momentos extracurriculares.")], "B", "VUNESP, Prefeitura de Sorocaba, Orientador Pedagógico, 2025, Q4243584", "A resolução orienta integração curricular e uso intencional e mediado, não liberação irrestrita nem padronização uniforme."),
              question("q3894", "q3822886", "Analise: I. Abstração seleciona elementos essenciais. II. Decomposição divide problema complexo em partes menores. III. Padrões e algoritmos só se aplicam a programação avançada. Está correto o que se afirma em:", [("A", "I, apenas."), ("B", "III, apenas."), ("C", "II e III, apenas."), ("D", "I e II, apenas.")], "D", "FURB, Prefeitura de São João Batista, Professor de Informática, 2025, Q3822886", "I e II definem corretamente os pilares; reconhecimento de padrões e algoritmos também se aplicam fora de programação avançada."),
              question("q3895", "q3734772", "Considere: decompor é dividir; reconhecer padrões é ignorar semelhanças; abstrair é focar detalhes irrelevantes; algoritmo é sequência de passos; pensamento computacional só existe na programação. A sequência correta é:", [("A", "V, F, F, V, F."), ("B", "F, V, V, F, V."), ("C", "V, V, F, F, V."), ("D", "F, F, V, V, F.")], "A", "AMAUC, Prefeitura de Arabutã, Professor de Educação Digital, 2025, Q3734772", "Somente as definições de decomposição e algoritmo são verdadeiras; pensamento computacional é aplicável a problemas não programados."),
              question("q3896", "q4252840", "No desenvolvimento de um algoritmo, depuração significa:", [("A", "compilar sem examinar falhas."), ("B", "reescrever tudo em linguagem aleatória."), ("C", "executar de modo controlado para localizar e corrigir defeitos."), ("D", "inserir erros propositais no produto final.")], "C", "AMEOSC, Prefeitura, Professor de Informática, 2025, Q4252840", "Depuração é o processo sistemático de identificar, reproduzir e corrigir erros, com teste posterior do comportamento esperado."),
              question("q3897", "q1686327", "As quatro dimensões recorrentes do pensamento computacional são:", [("A", "decomposição, reconhecimento de padrões, abstração e algoritmos."), ("B", "composição, padrões, abstração e decomposição."), ("C", "composição, análise, programação e hardware."), ("D", "decomposição, análise estatística, banco de dados e algoritmos.")], "A", "Cebraspe, SEED-PR, Professor da Educação Básica, 2021, Q1686327", "A enumeração consolidada reúne decomposição, reconhecimento de padrões, abstração e algoritmos."),
              question("q3898", "q3093188", "No planejamento de compras mensais, dividir despesas, identificar recorrências, reter variáveis relevantes e ordenar passos corresponde a:", [("A", "composição, processamento, abstração e estrutura de dados."), ("B", "decomposição, processamento, padrões e banco de dados."), ("C", "abstração, refatoração, logística e fatores."), ("D", "decomposição, abstração, reconhecimento de padrões e algoritmos.")], "D", "FURB, Prefeitura de Florianópolis, Professor Auxiliar de Tecnologia Educacional, 2023, Q3093188", "O exemplo cotidiano mobiliza os quatro pilares clássicos e mostra que pensamento computacional não depende de computador."),
              question("q3899", "q4140633", "Ao elaborar mapa da rotina e manter somente pontos essenciais do percurso para otimizar o tempo, exercita-se principalmente:", [("A", "reconhecimento de padrões."), ("B", "abstração."), ("C", "decomposição."), ("D", "depuração.")], "B", "FEPESE, Prefeitura de Chapecó, Professor de Oficina de Informática, 2025, Q4140633", "A abstração seleciona elementos relevantes e elimina detalhes que não contribuem para a solução."),
              question("q3900", "q4020261", "Identificar similaridades entre problemas e suas soluções para reutilizar uma estratégia corresponde a:", [("A", "decomposição."), ("B", "abstração."), ("C", "reconhecimento de padrões."), ("D", "codificação obrigatória.")], "C", "Funoesc, Prefeitura de Joaçaba, Professor de Informática, 2023, Q4020261", "Reconhecimento de padrões localiza características compartilhadas que permitem generalizar soluções."),
              question("q3901", "q3790164", "Analise: I. Abstração, decomposição, algoritmos e padrões são pilares. II. Herança é pilar. III. Padrões identificam características comuns. IV. Algoritmos só podem ser descritos em linguagem de programação. Está correto o que se afirma em:", [("A", "I e III, apenas."), ("B", "I, III e IV, apenas."), ("C", "II e IV, apenas."), ("D", "I, II, III e IV.")], "A", "FURB, Prefeitura de Bombinhas, Professor de Informática, 2024, Q3790164", "I e III são verdadeiras; herança não integra a enumeração e algoritmos podem ser expressos de várias formas."),
              question("q3902", "q3263499", "No letramento midiático, analisar quem comunica, para quem, por quê, e como publicação, promoção e patrocínio influenciam a informação corresponde ao componente de:", [("A", "audiência."), ("B", "representação."), ("C", "acessibilidade."), ("D", "produção.")], "D", "VUNESP, EsFCEx, Oficial de Pedagogia, 2024, Q3263499", "O componente produção investiga agentes, interesses, financiamento, publicação e persuasão que moldam a mensagem."),
              question("q3903", "q3569345", "Qual concepção expressa letramento digital crítico?", [("A", "Domínio eficiente de menus e aplicativos."), ("B", "Análise de linguagens, fluxos comunicacionais e relações de poder, articulada a dimensões éticas, cognitivas e sociotécnicas."), ("C", "Extensão neutra da leitura impressa para uma tela."), ("D", "Fluência técnica medida pelo tempo de uso de plataformas.")], "B", "FACET, Prefeitura de Bom Jardim, Professor de Informática, 2025, Q3569345", "Letramento digital crítico ultrapassa operação e incorpora leitura cultural, ética e política das práticas mediadas por tecnologia."),
              question("q3904", "q3963399", "Qual prática desenvolve letramento digital crítico?", [("A", "Restringir toda pesquisa on-line para evitar erros."), ("B", "Usar a plataforma somente como repositório."), ("C", "Avaliar confiabilidade de fontes e discutir autoria, direitos autorais e privacidade."), ("D", "Substituir mediação humana por personalização automática.")], "C", "IDECAN, Prefeitura de Feira de Santana, cargos docentes, 2026, Q3963399", "A prática combina pesquisa, avaliação de fontes e responsabilidade ética, em vez de reduzir tecnologia a acesso ou operação."),
              question("q3905", "q4168133", "Analise: I. Verificar fontes e compreender algoritmos são competências digitais. II. Plataformas são irrelevantes para a educação. III. É preciso distinguir informação confiável de desinformação. IV. Letramento digital vai além do uso instrumental. Está correto o que se afirma em:", [("A", "II, III e IV, apenas."), ("B", "I, III e IV, apenas."), ("C", "II e IV, apenas."), ("D", "I, II e III, apenas.")], "B", "AMEOSC, Prefeitura de São Miguel do Oeste, Operador de Máquinas, 2025, Q4168133", "I, III e IV são compatíveis com alfabetização midiática; plataformas influenciam produção e circulação de informação e não são irrelevantes."),
              question("q3906", "q2762501", "Na taxonomia da desordem informacional, qual afirmação está correta?", [("A", "Desinformação envolve conteúdo intencionalmente falso ou enganoso criado ou difundido para causar dano ou manipular."), ("B", "Informação incorreta exige intenção de enganar."), ("C", "Má-informação é necessariamente falsa e compartilhada de boa-fé."), ("D", "As três categorias são sinônimas e dispensam análise de intenção e contexto.")], "A", "FGV, BANESTES, Analista de Comunicação, 2023, Q2762501", "A distinção operacional considera falsidade, intenção e uso danoso de conteúdo verdadeiro; o vocabulário pode variar entre fontes."),
              question("q3907", "q4437358", "Ao validar texto gerado por inteligência artificial, a conduta mais adequada é:", [("A", "aceitar fluidez e coerência como prova suficiente."), ("B", "usar popularidade em redes como consenso técnico."), ("C", "selecionar uma única referência para evitar divergências."), ("D", "checar origem, cruzar fontes independentes, identificar vieses e registrar o caminho de verificação.")], "D", "CETREDE, Prefeitura de Maracanaú, Professor de Arte e Educação, 2026, Q4437358", "Validação exige procedência, triangulação, análise de vieses e rastreabilidade; qualidade textual não garante veracidade."),
              question("q3908", "q3265361", "Assinale a afirmação incorreta sobre apuração e fact-checking.", [("A", "O fact-checking substitui as coberturas diárias dos veículos de comunicação."), ("B", "A transparência das fontes permite que o público confira os dados."), ("C", "A checagem se relaciona ao enfrentamento de informações falsas ou distorcidas."), ("D", "A apuração busca responder o que, quem, quando, como, consequências e contexto.")], "A", "Instituto Consulplan, Câmara de Belo Horizonte, Jornalista, 2024, Q3265361", "Fact-checking é método ou modalidade de checagem; não substitui toda cobertura jornalística cotidiana."),
          ]

