name: Patch competencias digitais publicas

on:
  push:
    branches:
      - agent/revisa-competencias-digitais-publicas

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply editorial patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import json
          import textwrap

          base = Path("src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-gerais/competencias-digitais-informatica-aplicada-setor-publico/competencias-digitais-publicas")
          content_path = base / "conteudo.md"
          cheat_path = base / "cheat-sheet.md"
          questions_path = base / "questoes.json"

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected exactly one anchor, found {count}")
              return text.replace(old, new, 1)

          def replace_section(text: str, start: str, end: str, replacement: str, label: str) -> str:
              start_pos = text.find(start)
              if start_pos < 0:
                  raise SystemExit(f"{label}: start anchor not found")
              end_pos = text.find(end, start_pos)
              if end_pos < 0:
                  raise SystemExit(f"{label}: end anchor not found")
              return text[:start_pos] + replacement.rstrip() + text[end_pos:]

          content = content_path.read_text(encoding="utf-8")

          bncc_anchor = "A referência à BNCC no edital ajuda a compreender a formação para cidadania digital, mas a aplicação ao serviço público exige traduzir essas capacidades para processos, informações, decisões, serviços e deveres administrativos."
          bncc_block = bncc_anchor + textwrap.dedent("""

          ### 5.1 Cadeia normativa: não confunda os documentos

          | Marco | Função principal |
          |---|---|
          | **Parecer CNE/CEB nº 2/2022** | fundamenta as normas de Computação na Educação Básica como complemento à BNCC |
          | **Resolução CNE/CEB nº 1/2022** | institui as normas de Computação na Educação Básica — Complemento à BNCC |
          | **Lei nº 14.533/2023** | institui a PNED e seus quatro eixos estruturantes |
          | **Resolução CNE/CEB nº 2/2025** | estabelece diretrizes sobre dispositivos digitais e integração curricular da educação digital e midiática |

          A sequência é cumulativa. A BNCC Computação não é um quinto eixo da PNED, e a Resolução nº 2/2025 não substitui a Lei nº 14.533/2023. Em prova, identifique primeiro qual documento e qual nível de organização o enunciado menciona.
          """)
          content = replace_once(content, bncc_anchor, bncc_block, "normative chain")

          lateral_anchor = "9. **Decida como comunicar.** Compartilhar, corrigir, contextualizar ou não amplificar."
          lateral_block = lateral_anchor + textwrap.dedent("""

          ### 7.2 Leitura lateral

          Em vez de permanecer apenas na página suspeita, abra novas fontes e investigue o ecossistema da alegação:

          1. interrompa a avaliação baseada só na aparência da página;
          2. pesquise quem publica, financia ou mantém o domínio;
          3. procure cobertura independente e qualificada;
          4. localize o ato, estudo, base, imagem ou declaração original;
          5. confira data, versão, contexto e alterações posteriores;
          6. retorne à alegação e classifique o grau de sustentação.

          Fonte primária não é sinônimo de fonte imparcial ou infalível. Ela é a referência adequada para saber o que determinado ato, órgão, estudo ou agente efetivamente registrou; a interpretação de seus resultados ainda exige método, contexto e comparação.
          """)
          content = replace_once(content, lateral_anchor, lateral_block, "lateral reading")
          content = replace_once(content, "### 7.2 Sinais não são prova isolada", "### 7.3 Sinais não são prova isolada", "renumber 7.3")
          content = replace_once(content, "### 7.3 Números e visualizações", "### 7.4 Números e visualizações", "renumber 7.4")

          desinfo_start = "## 8. Desinformação e comunicação pública"
          desinfo_end = "### 8.1 Fatores de circulação"
          desinfo_replacement = textwrap.dedent("""
          ## 8. Desordem informacional e comunicação pública

          A terminologia varia entre autores e instituições. Na taxonomia mais frequente entre organismos das Nações Unidas, a intenção distingue informação incorreta de desinformação:

          | Categoria | Distinção operacional |
          |---|---|
          | **informação incorreta** (`misinformation`) | conteúdo falso ou inexato compartilhado sem intenção de enganar |
          | **desinformação** (`disinformation`) | conteúdo falso ou enganoso difundido deliberadamente para enganar ou manipular |
          | **má-informação** (`mal-information`) | conteúdo verdadeiro usado fora de contexto ou de modo destinado a causar dano |
          | **fake news** | expressão imprecisa; prefira identificar a categoria e a técnica empregada |

          Em prova, siga a definição da fonte indicada pelo enunciado. Na ausência de fonte, reconheça a distinção mais difundida sem tratá-la como fronteira terminológica universal. Para o agente público, a conduta prática continua sendo verificar antes de usar ou divulgar, comunicar incerteza e corrigir com transparência.

          ### 8.1 Fatores de circulação
          """)
          content = replace_section(content, desinfo_start, desinfo_end, desinfo_replacement, "desinformation taxonomy")

          synthetic_anchor = "Combater desinformação não autoriza censura genérica nem dispensa direitos fundamentais. A atuação pública deve ser legal, proporcional, transparente e voltada à integridade da informação e ao interesse público."
          synthetic_block = synthetic_anchor + textwrap.dedent("""

          ### 8.3 Conteúdo sintético ou manipulado

          Diante de áudio, imagem ou vídeo possivelmente gerado ou alterado por inteligência artificial:

          - procure a publicação original e versões anteriores;
          - confira se o material aparece em outro contexto, data ou local;
          - examine cortes, continuidade, sincronização e metadados disponíveis;
          - compare com registros independentes e com a fonte atribuída;
          - não trate detector automático de IA como prova conclusiva;
          - documente o caminho de verificação e o grau de incerteza.

          Aparência convincente e coerência interna não substituem procedência e confirmação externa.
          """)
          content = replace_once(content, synthetic_anchor, synthetic_block, "synthetic content")

          ethics_anchor = "Anonimizar, agregar ou pseudonimizar dados pode reduzir riscos, mas cada técnica possui limites. Dados anonimizados deixam de ser pessoais para a LGPD quando o processo não puder ser revertido por meios próprios ou esforços razoáveis, considerados fatores objetivos. **Pseudonimização não equivale automaticamente a anonimização**: ainda pode haver associação ao titular mediante informação adicional mantida separadamente."
          ethics_block = ethics_anchor + textwrap.dedent("""

          ### 9.1 Ciclo ético dos dados

          | Etapa | Risco principal | Controle esperado |
          |---|---|---|
          | coleta | excesso ou finalidade vaga | delimitar problema, finalidade e necessidade |
          | preparação | erro, ausência ou distorção | qualidade, documentação e rastreabilidade |
          | modelagem | viés e correlação espúria | testes por grupos, casos-limite e revisão |
          | decisão | opacidade e automatismo | explicação, supervisão e contestação |
          | compartilhamento | reutilização incompatível | finalidade, minimização e controle de acesso |
          | publicação | reidentificação ou conclusão enganosa | agregação, contexto e metodologia |
          | retenção | conservação indefinida | prazo, revisão e descarte seguro |

          Uma taxa global de acerto pode ocultar injustiça. Sistema com 95% de precisão total pode produzir falsos positivos muito superiores para determinado grupo; por isso, desempenho médio deve ser examinado junto com a distribuição dos erros e seus impactos.
          """)
          content = replace_once(content, ethics_anchor, ethics_block, "data lifecycle")

          lgpd_start = "## 10. Núcleo da LGPD para a atuação pública"
          lgpd_end = "\n---\n\n## 11. Casos integrados"
          lgpd_replacement = textwrap.dedent("""
          ## 10. Ponte com a LGPD

          Ética de dados e conformidade jurídica são relacionadas, mas não idênticas. Nesta página, o foco está em finalidade, proporcionalidade, qualidade, vieses, explicabilidade, impactos e prestação de contas. O estudo sistemático de conceitos, bases legais, direitos dos titulares e regras do Poder Público pertence ao tópico **3.2 — LGPD** do edital.

          Para integrar os assuntos sem duplicá-los, retenha o mapa mínimo:

          | Ponto | Regra de conexão |
          |---|---|
          | agentes | controlador decide; operador trata em nome do controlador; encarregado atua como canal nos termos legais |
          | princípios | finalidade, adequação, necessidade, qualidade, transparência, segurança, prevenção, não discriminação e prestação de contas limitam o tratamento |
          | base legal | consentimento não é a única hipótese e pode ser inadequado quando não há escolha efetivamente livre |
          | Poder Público | o tratamento deve servir à finalidade pública, ao interesse público e às competências ou atribuições legais |
          | dados públicos | disponibilidade pública não autoriza reutilização irrestrita |
          | transparência | publicidade administrativa e proteção de dados devem ser compatibilizadas |

          As questões jurídicas já existentes permanecem úteis como revisão interdisciplinar, mas novas questões desta página priorizam os itens 1.1 e 1.2: competências digitais, pensamento computacional, análise crítica, ética de dados e desinformação.
          """)
          content = replace_section(content, lgpd_start, lgpd_end, lgpd_replacement, "LGPD bridge")

          face_old = "Um sistema pode apresentar taxas de erro diferentes entre grupos em razão de dados de treinamento, desenho e condições de uso. A avaliação deve considerar necessidade, proporcionalidade, dados sensíveis biométricos, segurança, não discriminação, transparência, precisão, impactos e mecanismos de contestação. Alta sofisticação técnica não elimina esses riscos."
          face_new = "Um sistema pode apresentar taxas de erro diferentes entre grupos em razão de dados de treinamento, desenho e condições de uso. Mesmo uma precisão global de 95% pode esconder falsos positivos muito superiores para determinado grupo. A avaliação deve considerar necessidade, proporcionalidade, dados sensíveis biométricos, segurança, não discriminação, transparência, distribuição dos erros, impactos e mecanismos de contestação. Alta sofisticação técnica não elimina esses riscos."
          content = replace_once(content, face_old, face_new, "facial recognition")

          content = replace_once(
              content,
              "- Viralidade e posição em buscador **não** comprovam veracidade.",
              "- Viralidade e posição em buscador **não** comprovam veracidade.\n- Fonte primária **não** é automaticamente imparcial ou suficiente.\n- Detector de conteúdo gerado por IA **não** é prova conclusiva.",
              "new traps",
          )
          content = replace_once(
              content,
              "- O poder público **não** depende sempre de consentimento, mas precisa de base legal.\n- Dado publicamente acessível **não** pode ser reutilizado sem finalidade e limites.\n- Transparência e proteção de dados devem ser **compatibilizadas**, não tratadas como absolutos incompatíveis.",
              "- Informação incorreta e desinformação podem ser distinguidas pela **ausência ou presença de intenção**, conforme a taxonomia usada.\n- Precisão global **não** prova equidade entre grupos.\n- LGPD é tópico próprio do edital; aqui ela aparece como ponte para a ética de dados.",
              "focused traps",
          )

          ref_anchor = "- BRASIL. Ministério da Educação. [Base Nacional Comum Curricular](https://basenacionalcomum.mec.gov.br/a-base). Referência normativa da educação básica e acesso aos documentos complementares. Acesso em 18 jul. 2026."
          ref_block = ref_anchor + textwrap.dedent("""
          - BRASIL. Conselho Nacional de Educação. [Parecer CNE/CEB nº 2/2022 e Resolução CNE/CEB nº 1/2022](https://portal.mec.gov.br/pet/323-secretarias-112877938/orgaos-vinculados-82187207/62391-bncc-ensino-medio). Normas sobre Computação na Educação Básica — Complemento à BNCC. Acesso em 19 jul. 2026.
          - BRASIL. Conselho Nacional de Educação. [Resolução CNE/CEB nº 2/2025](https://www.gov.br/secom/pt-br/assuntos/educacao-midiatica/colecao/colecao-de-educacao-digital-e-midiatica). Diretrizes para dispositivos digitais e integração curricular da educação digital e midiática. Acesso em 19 jul. 2026.
          - UNESCO. [Misinformation](https://www.unesco.org/en/query-list/m/misinformation) e [Disinformation](https://www.unesco.org/en/query-list/d/disinformation). Distinção terminológica baseada na intenção, com ressalva sobre variação de uso. Acesso em 19 jul. 2026.
          """)
          content = replace_once(content, ref_anchor, ref_block, "new references")
          content_path.write_text(content, encoding="utf-8")

          cheat = textwrap.dedent("""
          # Competências digitais no serviço público

          ## 1. Conceitos fundamentais

          Competência digital = **conhecimentos + habilidades + atitudes** para compreender, escolher, usar, avaliar e criar soluções digitais de modo crítico, seguro, inclusivo, ético e orientado ao interesse público.

          | Conceito | Núcleo |
          |---|---|
          | cultura digital | práticas, valores, linguagens e relações transformados por tecnologias |
          | cidadania digital | direitos, deveres, participação e convivência responsável no digital |
          | letramento digital | usar e criar com tecnologias de modo autônomo, seguro e apropriado |
          | letramento informacional | reconhecer necessidade, localizar, avaliar, usar e comunicar informação |
          | letramento midiático | analisar mensagens, agentes, interesses, formatos, circulação e efeitos |
          | pensamento computacional | formular e resolver problemas metodicamente, inclusive por algoritmos |

          **Inclusão efetiva:** conectividade + acessibilidade + competência + linguagem clara + apoio + segurança + teste com usuários.

          ## 2. Matriz 4–5–3 e cadeia normativa

          | Estrutura | Quantidade |
          |---|---:|
          | eixos estruturantes da PNED | 4 |
          | campos da Educação Digital Escolar no art. 3º | 5 |
          | eixos da BNCC Computação | 3 |

          **PNED — 4 eixos:** Inclusão Digital; Educação Digital Escolar; Capacitação e Especialização Digital; Pesquisa e Desenvolvimento em TICs.

          **Art. 3º — 5 campos:** pensamento computacional; mundo digital; cultura digital; direitos digitais; tecnologia assistiva.

          **BNCC Computação — 3 eixos:** pensamento computacional; mundo digital; cultura digital.

          | Marco | Função |
          |---|---|
          | Parecer CNE/CEB nº 2/2022 | fundamenta Computação como complemento à BNCC |
          | Resolução CNE/CEB nº 1/2022 | institui as normas de Computação na Educação Básica |
          | Lei nº 14.533/2023 | institui a PNED |
          | Resolução CNE/CEB nº 2/2025 | integra educação digital e midiática ao currículo e disciplina o uso de dispositivos |

          A PNED articula políticas; **não substitui** políticas nacionais, estaduais, distritais ou municipais.

          ## 3. Pensamento computacional

          Não é sinônimo de programação. Algoritmo pode ser descrito em linguagem comum, fluxograma ou tabela.

          | Operação | Pergunta |
          |---|---|
          | decomposição | em quais partes o problema pode ser dividido? |
          | reconhecimento de padrões | que regularidades e exceções se repetem? |
          | abstração | quais características são essenciais? |
          | algoritmo | quais passos, condições e saídas resolvem o problema? |

          Método: **problema → pessoas/dados/etapas → decomposição/padrões → abstração → regras → testes → impactos → monitoramento**.

          Automação não elimina responsabilidade, explicação, teste de vieses, revisão, contestação ou monitoramento.

          ## 4. Verificação de informação

          1. delimite a alegação;
          2. identifique autor, publicador e data;
          3. localize a fonte primária;
          4. examine evidência, método e contexto;
          5. abra novas abas e investigue quem publica;
          6. compare fontes independentes e qualificadas;
          7. separe fato, opinião, previsão, sátira e publicidade;
          8. reconheça incerteza;
          9. documente o caminho de verificação;
          10. decida se deve compartilhar, corrigir, contextualizar ou não amplificar.

          **Leitura lateral:** saia da página, pesquise o domínio, procure cobertura independente e rastreie imagem, dado ou declaração até a origem.

          Fonte primária informa o que foi registrado; não garante imparcialidade nem interpretação correta.

          Em gráficos: fonte, data, definição, amostra, período, valores absolutos/relativos, escala e correlação ≠ causalidade.

          ## 5. Desordem informacional

          | Categoria | Regra curta |
          |---|---|
          | informação incorreta | falso compartilhado sem intenção de enganar |
          | desinformação | falso ou enganoso difundido deliberadamente |
          | má-informação | verdadeiro usado fora de contexto ou para causar dano |
          | fake news | rótulo impreciso; prefira a categoria específica |

          Viralidade mede circulação, não verdade. Aparência profissional, posição em buscador e repetição também não comprovam veracidade.

          **Conteúdo sintético:** procure origem, versões anteriores, contexto, continuidade, metadados e confirmação independente. Detector de IA não é prova conclusiva.

          Resposta pública: fonte + data + contexto + grau de certeza + linguagem clara + correção visível + proteção de dados.

          ## 6. Ética de dados

          | Etapa | Controle-chave |
          |---|---|
          | coleta | finalidade e necessidade |
          | preparação | qualidade e rastreabilidade |
          | modelagem | testes por grupos e casos-limite |
          | decisão | explicação, supervisão e contestação |
          | compartilhamento | minimização e controle de acesso |
          | publicação | agregação, contexto e metodologia |
          | retenção | prazo e descarte seguro |

          Precisão média pode esconder falsos positivos ou falsos negativos concentrados em determinados grupos.

          Pseudonimização não equivale automaticamente a anonimização.

          **Ponte com LGPD:** controlador decide; operador trata em nome do controlador; consentimento não é a única base; dados públicos não têm uso irrestrito; transparência e proteção devem ser compatibilizadas. O estudo jurídico completo pertence ao tópico 3.2 do edital.

          ## Pegadinhas

          - ferramenta dominada ≠ competência digital completa;
          - equipamento disponível ≠ inclusão efetiva;
          - cidadania digital ≠ etiqueta;
          - pensamento computacional ≠ programação;
          - algoritmo ≠ código necessariamente;
          - automação ≠ neutralidade;
          - fonte primária ≠ fonte automaticamente verdadeira;
          - viral ≠ verdadeiro;
          - detector de IA ≠ prova;
          - PNED = 4; art. 3º = 5; BNCC Computação = 3;
          - precisão global ≠ equidade;
          - dado público ≠ uso irrestrito.

          ## Sequência de decisão

          **Finalidade → informação → processo → pessoas → dados → decisão → comunicação → controle.**
          """).lstrip()
          cheat_path.write_text(cheat, encoding="utf-8")

          data = json.loads(questions_path.read_text(encoding="utf-8"))
          questions = data["questions"]
          by_id = {question["id"]: question for question in questions}
          if len(by_id) != len(questions):
              raise SystemExit("duplicate question IDs before patch")

          def update_question(qid: str, prompt: str, options: list[tuple[str, str]], correct: str, explanation: str) -> None:
              question = by_id[qid]
              question["revision"] = int(question["revision"]) + 1
              question["prompt"] = prompt
              question["options"] = [{"id": oid, "text": text} for oid, text in options]
              question["correctOptionId"] = correct
              question["explanation"] = explanation

          update_question(
              "q3819",
              "Um órgão implantou atendimento automatizado rápido, mas o serviço exige aparelho recente, coleta dados sem necessidade demonstrada e não oferece contestação. A avaliação mais adequada é:",
              [
                  ("A", "A solução demonstra competência digital porque velocidade é o critério decisivo."),
                  ("B", "A coleta excessiva é aceitável se o sistema reduzir filas."),
                  ("C", "A ausência de contestação é compensada pela automação."),
                  ("D", "A solução precisa ser revista quanto a finalidade, inclusão, necessidade dos dados e controle das decisões."),
              ],
              "D",
              "Competência digital no setor público integra eficácia, interesse público, inclusão, proteção e possibilidade de compreensão e controle. Fonte: questão autoral baseada nas referências do conteúdo.",
          )
          update_question(
              "q3820",
              "Uma plataforma altera a forma como cidadãos recebem notícias do órgão e prioriza conteúdos por engajamento. Esse caso exemplifica principalmente:",
              [
                  ("A", "cultura digital, pois envolve práticas sociais e mediação algorítmica."),
                  ("B", "apenas infraestrutura de rede."),
                  ("C", "somente alfabetização operacional."),
                  ("D", "pensamento computacional, porque todo algoritmo é um programa público."),
              ],
              "A",
              "Cultura digital abrange práticas, valores e relações mediadas por plataformas e algoritmos. Fonte: questão autoral baseada nas referências do conteúdo.",
          )
          update_question(
              "q3821",
              "Em consulta pública on-line, qual medida melhor promove cidadania digital?",
              [
                  ("A", "Permitir participação sem informar finalidade ou uso das contribuições."),
                  ("B", "Oferecer canal acessível, regras claras, proteção de dados e retorno sobre a participação."),
                  ("C", "Restringir o acesso a usuários com equipamento de alto desempenho."),
                  ("D", "Eliminar moderação e responsabilização para garantir liberdade absoluta."),
              ],
              "B",
              "Cidadania digital reúne participação, direitos, deveres, segurança, transparência e responsabilidade. Fonte: questão autoral baseada nas referências do conteúdo.",
          )
          update_question(
              "q3822",
              "Um servidor domina planilhas, mas replica indicador sem compreender a fórmula, a fonte ou o efeito da decisão. O caso mostra que:",
              [
                  ("A", "domínio operacional basta para caracterizar letramento digital."),
                  ("B", "letramento digital exige também compreensão, avaliação e uso apropriado da informação."),
                  ("C", "a fórmula torna desnecessária a análise crítica."),
                  ("D", "somente o setor de tecnologia pode interpretar indicadores."),
              ],
              "B",
              "Letramento digital associa operação a compreensão, finalidade, avaliação, criação e segurança. Fonte: questão autoral baseada nas referências do conteúdo.",
          )
          update_question(
              "q3823",
              "Antes de pesquisar dados sobre tempo de atendimento, a equipe define período, unidade de medida, população e decisão que será apoiada. Essa etapa corresponde a:",
              [
                  ("A", "reconhecimento da necessidade de informação e delimitação da busca."),
                  ("B", "validação automática pela popularidade da fonte."),
                  ("C", "substituição da evidência por opinião especializada."),
                  ("D", "divulgação do resultado antes da coleta."),
              ],
              "A",
              "O letramento informacional começa pela definição do que se precisa saber, com qual precisão e para qual finalidade. Fonte: questão autoral baseada nas referências do conteúdo.",
          )
          update_question(
              "q3824",
              "Duas páginas publicam o mesmo dado, mas uma omite patrocinador, recorta o gráfico e usa título alarmista. O letramento midiático exige:",
              [
                  ("A", "considerar apenas a correção ortográfica."),
                  ("B", "examinar autoria, interesse, enquadramento, evidência e circulação."),
                  ("C", "aceitar a versão com mais compartilhamentos."),
                  ("D", "presumir neutralidade porque o número é verdadeiro."),
              ],
              "B",
              "A leitura midiática crítica examina como a mensagem é produzida, enquadrada, financiada e distribuída. Fonte: questão autoral baseada nas referências do conteúdo.",
          )
          update_question(
              "q3825",
              "Em uma prova, 'alfabetização digital' é usada para domínio inicial de operações e 'letramento digital' para uso social crítico. A interpretação correta é:",
              [
