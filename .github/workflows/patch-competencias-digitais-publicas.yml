          existing_ids = set(by_id)
          duplicate_new = existing_ids.intersection(item["id"] for item in new_questions)
          if duplicate_new:
              raise SystemExit(f"new question IDs already exist: {sorted(duplicate_new)}")
          questions.extend(new_questions)
          data["questionSetRevision"] = int(data.get("questionSetRevision", 0)) + 1

          final_ids = [item["id"] for item in questions]
          if len(final_ids) != len(set(final_ids)):
              raise SystemExit("duplicate question IDs after patch")
          if len(questions) != 90:
              raise SystemExit(f"expected 90 questions, found {len(questions)}")
          for item in questions:
              options = item.get("options", [])
              option_ids = [option.get("id") for option in options]
              if len(options) != 4 or len(option_ids) != len(set(option_ids)):
                  raise SystemExit(f"invalid options in {item['id']}")
              if item.get("correctOptionId") not in option_ids:
                  raise SystemExit(f"invalid correct option in {item['id']}")
              if "Fonte:" not in item.get("explanation", ""):
                  raise SystemExit(f"missing source in {item['id']}")

          lines = ["{", f'  "schemaVersion": {int(data["schemaVersion"])},', f'  "questionSetRevision": {int(data["questionSetRevision"])},', '  "questions": [']
          for index, item in enumerate(questions):
              suffix = "," if index < len(questions) - 1 else ""
              lines.append("    " + json.dumps(item, ensure_ascii=False, separators=(",", ":")) + suffix)
          lines.extend(["  ]", "}"])
          questions_path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

