name: Debug Windows editorial validation

on:
  push:
    branches:
      - agent/revisa-windows-arquivos-pastas

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm

      - name: Extract patch script
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/patch-windows-arquivos-pastas.yml').read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(source) if "python3 <<'PY'" in line) + 1
          end = next(i for i in range(start, len(source)) if source[i].strip() == 'PY')
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in source[start:end]) + '\n'
          Path('/tmp/windows-patch.py').write_text(script, encoding='utf-8')
          PY

      - name: Run patch and validation with captured statuses
        shell: bash
        run: |
          set +e
          python3 /tmp/windows-patch.py > /tmp/patch.out 2>&1
          patch_status=$?
          npm ci > /tmp/npm-ci.out 2>&1
          ci_status=$?
          npm run test:unit > /tmp/test.out 2>&1
          test_status=$?
          npm run check > /tmp/check.out 2>&1
          check_status=$?
          npm run build > /tmp/build.out 2>&1
          build_status=$?
          set -e
          {
            echo "patch_status=$patch_status"
            echo "npm_ci_status=$ci_status"
            echo "unit_status=$test_status"
            echo "check_status=$check_status"
            echo "build_status=$build_status"
            for name in patch npm-ci test check build; do
              echo "--- $name tail ---"
              tail -n 80 "/tmp/$name.out" 2>/dev/null || true
            done
          } > /tmp/windows-validation-debug.log
          git reset --hard HEAD
          cp /tmp/windows-validation-debug.log .windows-validation-debug.log
          rm .github/workflows/debug-windows-validation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- .github/workflows/debug-windows-validation.yml .windows-validation-debug.log
          git commit -m "chore: registra validação do patch de Windows"
          git pull --rebase origin ${GITHUB_REF_NAME} || true
          git push origin HEAD:${GITHUB_REF_NAME}
