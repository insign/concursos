name: Finalize coesao textual in KV

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  finalize-kv:
    name: Mark coesao textual as done
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Mark done
        shell: bash
        run: |
          curl --fail-with-body --silent --show-error \
            -X PUT \
            -H 'Content-Type: application/json' \
            --data '"done"' \
            'https://kv.helio.me/adm/value?path=%2Flinks%2Ftce-ma-2026-analista-administracao--coesao-textual%2Fstatus' \
            > /tmp/result.json
          python3 - <<'PY'
          import json
          key = 'tce-ma-2026-analista-administracao--coesao-textual'
          expected_path = '/concursos/tce-ma-2026-analista-administracao/coesao-textual/'
          with open('/tmp/result.json', encoding='utf-8') as stream:
              data = json.load(stream)
          item = data['json']['links'][key]
          print('mutation item:', item)
          if item != {'path': expected_path, 'status': 'done'}:
              raise SystemExit(1)
          PY

      - name: Verify persisted value
        shell: bash
        run: |
          curl --fail-with-body --silent --show-error \
            'https://kv.helio.me/adm' \
            > /tmp/adm.json
          python3 - <<'PY'
          import json
          key = 'tce-ma-2026-analista-administracao--coesao-textual'
          expected_path = '/concursos/tce-ma-2026-analista-administracao/coesao-textual/'
          with open('/tmp/adm.json', encoding='utf-8') as stream:
              data = json.load(stream)
          item = data['json']['links'][key]
          print('persisted item:', item)
          print('version:', data['version'])
          if item != {'path': expected_path, 'status': 'done'}:
              raise SystemExit(1)
          PY
