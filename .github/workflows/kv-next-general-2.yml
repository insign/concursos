name: Reserve next published general content in KV

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  reserve-kv:
    name: Select and mark next general content as analyzing
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Select first available published general subject
        shell: bash
        run: |
          curl --fail-with-body --silent --show-error 'https://kv.helio.me/adm' > /tmp/adm.json
          python3 - <<'PY'
          import json
          from urllib.parse import quote

          candidates = [
              ('tce-ma-2026-analista-administracao--classes-nominais-de-palavras', '/concursos/tce-ma-2026-analista-administracao/classes-nominais-de-palavras/'),
              ('tce-ma-2026-analista-administracao--verbo-como-classe-de-palavras', '/concursos/tce-ma-2026-analista-administracao/verbo-como-classe-de-palavras/'),
              ('tce-ma-2026-analista-administracao--classes-invariaveis-de-palavras', '/concursos/tce-ma-2026-analista-administracao/classes-invariaveis-de-palavras/'),
              ('tce-ma-2026-analista-administracao--coesao-textual', '/concursos/tce-ma-2026-analista-administracao/coesao-textual/'),
              ('tce-ma-2026-analista-administracao--ortografia-oficial', '/concursos/tce-ma-2026-analista-administracao/ortografia-oficial/'),
              ('tce-ma-2026-analista-administracao--pontuacao', '/concursos/tce-ma-2026-analista-administracao/pontuacao/'),
              ('tce-ma-2026-analista-administracao--concordancia-verbal-nominal', '/concursos/tce-ma-2026-analista-administracao/concordancia-verbal-nominal/'),
              ('tce-ma-2026-analista-administracao--regencia-verbal-nominal', '/concursos/tce-ma-2026-analista-administracao/regencia-verbal-nominal/'),
              ('tce-ma-2026-analista-administracao--crase', '/concursos/tce-ma-2026-analista-administracao/crase/'),
              ('tce-ma-2026-analista-administracao--colocacao-pronomes-atonos', '/concursos/tce-ma-2026-analista-administracao/colocacao-pronomes-atonos/'),
          ]

          with open('/tmp/adm.json', encoding='utf-8') as stream:
              document = json.load(stream)
          links = document.get('json', {}).get('links', {})
          print('KV_VERSION_BEFORE', document.get('version'))

          for key, path in candidates:
              item = links.get(key)
              status = item.get('status') if isinstance(item, dict) else None
              print('CANDIDATE', key, status or 'absent', item)
              if status in {'done', 'analyzing'}:
                  continue
              selected = {'key': key, 'path': path}
              payload = {'path': path, 'status': 'analyzing'}
              with open('/tmp/selected.json', 'w', encoding='utf-8') as out:
                  json.dump(selected, out, ensure_ascii=False)
              with open('/tmp/payload.json', 'w', encoding='utf-8') as out:
                  json.dump(payload, out, ensure_ascii=False)
              with open('/tmp/pointer.txt', 'w', encoding='utf-8') as out:
                  out.write(quote('/links/' + key, safe=''))
              print('SELECTED_KEY', key)
              print('SELECTED_PATH', path)
              break
          else:
              raise SystemExit('no available published general subject found')
          PY

      - name: Mark selected subject as analyzing
        shell: bash
        run: |
          pointer=$(cat /tmp/pointer.txt)
          curl --fail-with-body --silent --show-error \
            -X PUT \
            -H 'Content-Type: application/json' \
            --data @/tmp/payload.json \
            "https://kv.helio.me/adm/value?path=${pointer}" \
            > /tmp/mutation.json
          python3 - <<'PY'
          import json
          with open('/tmp/selected.json', encoding='utf-8') as stream:
              selected = json.load(stream)
          expected = {'path': selected['path'], 'status': 'analyzing'}
          with open('/tmp/mutation.json', encoding='utf-8') as stream:
              document = json.load(stream)
          item = document['json']['links'][selected['key']]
          print('MUTATION_ITEM', item)
          print('KV_VERSION_AFTER_MUTATION', document.get('version'))
          if item != expected:
              raise SystemExit(1)
          PY

      - name: Verify persisted value
        shell: bash
        run: |
          curl --fail-with-body --silent --show-error 'https://kv.helio.me/adm' > /tmp/adm-after.json
          python3 - <<'PY'
          import json
          with open('/tmp/selected.json', encoding='utf-8') as stream:
              selected = json.load(stream)
          expected = {'path': selected['path'], 'status': 'analyzing'}
          with open('/tmp/adm-after.json', encoding='utf-8') as stream:
              document = json.load(stream)
          item = document['json']['links'][selected['key']]
          print('PERSISTED_ITEM', item)
          print('KV_VERSION_PERSISTED', document.get('version'))
          if item != expected:
              raise SystemExit(1)
          PY
