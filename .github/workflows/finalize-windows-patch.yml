name: Finalize Windows editorial patch

on:
  push:
    branches:
      - agent/revisa-windows-arquivos-pastas

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Apply already validated patch and commit
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/patch-windows-arquivos-pastas.yml').read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(source) if "python3 <<'PY'" in line) + 1
          end = next(i for i in range(start, len(source)) if source[i].strip() == 'PY')
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in source[start:end]) + '\n'
          Path('/tmp/windows-patch.py').write_text(script, encoding='utf-8')
          PY
          python3 /tmp/windows-patch.py
          rm .github/workflows/patch-windows-arquivos-pastas.yml
          rm .github/workflows/finalize-windows-patch.yml
          rm -f .windows-patch-debug.log .windows-validation-debug.log
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- \
            .github/workflows/patch-windows-arquivos-pastas.yml \
            .github/workflows/finalize-windows-patch.yml \
            .windows-patch-debug.log \
            .windows-validation-debug.log \
            src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-gerais/competencias-digitais-informatica-aplicada-setor-publico/windows-arquivos-pastas/conteudo.md \
            src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-gerais/competencias-digitais-informatica-aplicada-setor-publico/windows-arquivos-pastas/cheat-sheet.md \
            src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-gerais/competencias-digitais-informatica-aplicada-setor-publico/windows-arquivos-pastas/questoes.json
          git diff --cached --check
          git diff --cached --quiet && { echo "No changes to commit"; exit 1; }
          git commit -m "Revisa Windows, arquivos, pastas e programas"
          git push origin HEAD:${GITHUB_REF_NAME}
