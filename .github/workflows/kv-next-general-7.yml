name: Finalize concordância verbal e nominal in KV

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  finalize-kv:
    name: Mark concordância verbal e nominal as done
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Mark done
        shell: bash
        run: |
          curl --fail-with-body --silent --show-error \
            -X PUT \
            -H 'Content-Type: application/json' \
            --data '"done"' \
            'https://kv.helio.me/adm/value?path=%2Flinks%2Ftce-ma-2026-analista-administracao--concordancia-verbal-nominal%2Fstatus' \
            > /tmp/mutation.json
          python3 - <<'PY'
          import json
          key = 'tce-ma-2026-analista-administracao--concordancia-verbal-nominal'
          expected = {
              'path': '/concursos/tce-ma-2026-analista-administracao/concordancia-verbal-nominal/',
              'status': 'done',
          }
          with open('/tmp/mutation.json', encoding='utf-8') as stream:
              document = json.load(stream)
          item = document['json']['links'][key]
          print('MUTATION_ITEM', item)
          print('KV_VERSION_AFTER_MUTATION', document.get('version'))
          if item != expected:
              raise SystemExit(1)
          PY

      - name: Verify persisted value
        shell: bash
        run: |
          curl --fail-with-body --silent --show-error 'https://kv.helio.me/adm' > /tmp/adm-after.json
          python3 - <<'PY'
          import json
          key = 'tce-ma-2026-analista-administracao--concordancia-verbal-nominal'
          expected = {
              'path': '/concursos/tce-ma-2026-analista-administracao/concordancia-verbal-nominal/',
              'status': 'done',
          }
          with open('/tmp/adm-after.json', encoding='utf-8') as stream:
              document = json.load(stream)
          item = document['json']['links'][key]
          print('PERSISTED_ITEM', item)
          print('KV_VERSION_PERSISTED', document.get('version'))
          if item != expected:
              raise SystemExit(1)
          PY
