name: Finalize análise do valor e alienação in KV

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  finalize-kv:
    name: Mark análise do valor e alienação as done
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Mark done
        shell: bash
        run: |
          cat > /tmp/payload.json <<'JSON'
          {
            "path": "/concursos/tce-ma-2026-analista-administracao/analise-valor-alienacao/",
            "status": "done"
          }
          JSON

          curl --fail-with-body --silent --show-error \
            -X PUT \
            -H 'Content-Type: application/json' \
            --data @/tmp/payload.json \
            'https://kv.helio.me/adm/value?path=%2Flinks%2Ftce-ma-2026-analista-administracao--analise-valor-alienacao' \
            > /tmp/mutation.json

          python3 - <<'PY'
          import json
          key = 'tce-ma-2026-analista-administracao--analise-valor-alienacao'
          expected = {
              'path': '/concursos/tce-ma-2026-analista-administracao/analise-valor-alienacao/',
              'status': 'done',
          }
          with open('/tmp/mutation.json', encoding='utf-8') as stream:
              document = json.load(stream)
          item = document['json']['links'][key]
          print('MUTATION_ITEM', item)
          print('KV_VERSION_AFTER_MUTATION', document.get('version'))
          if item != expected:
              raise SystemExit(1)
          PY

      - name: Verify persisted value
        shell: bash
        run: |
          curl --fail-with-body --silent --show-error 'https://kv.helio.me/adm' > /tmp/adm-after.json
          python3 - <<'PY'
          import json
          key = 'tce-ma-2026-analista-administracao--analise-valor-alienacao'
          expected = {
              'path': '/concursos/tce-ma-2026-analista-administracao/analise-valor-alienacao/',
              'status': 'done',
          }
          with open('/tmp/adm-after.json', encoding='utf-8') as stream:
              document = json.load(stream)
          item = document['json']['links'][key]
          print('PERSISTED_ITEM', item)
          print('KV_VERSION_PERSISTED', document.get('version'))
          if item != expected:
              raise SystemExit(1)
          PY
