name: Diagnose almoxarifado review

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: diagnose-almoxarifado-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  diagnose:
    name: Validate and diagnose almoxarifado review
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Validate materialized files
        run: python3 .github/patch-almoxarifado.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run Astro checks and persist diagnostic
        shell: bash
        run: |
          set +e
          npm run check > /tmp/astro-check.log 2>&1
          status=$?
          set -e
          cat /tmp/astro-check.log
          if [ "$status" -ne 0 ]; then
            cp /tmp/astro-check.log .github/astro-diagnostic-almoxarifado.txt
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add .github/astro-diagnostic-almoxarifado.txt
            if ! git diff --cached --quiet; then
              git commit -m 'ci: registra diagnóstico Astro de almoxarifado'
              git push origin HEAD:${{ github.head_ref }}
            fi
            exit "$status"
          fi

      - name: Build production site
        run: npm run build
