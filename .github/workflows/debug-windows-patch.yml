name: Debug Windows editorial patch

on:
  push:
    branches:
      - agent/revisa-windows-arquivos-pastas

permissions:
  contents: write

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Extract and run patch script
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/patch-windows-arquivos-pastas.yml').read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(source) if "python3 <<'PY'" in line) + 1
          end = next(i for i in range(start, len(source)) if source[i].strip() == 'PY')
          script = '\n'.join(line[10:] if line.startswith('          ') else line for line in source[start:end]) + '\n'
          Path('/tmp/windows-patch.py').write_text(script, encoding='utf-8')
          PY
          set +e
          python3 /tmp/windows-patch.py > /tmp/windows-patch.out 2> /tmp/windows-patch.err
          status=$?
          set -e
          {
            echo "exit_status=$status"
            echo "--- stdout ---"
            cat /tmp/windows-patch.out
            echo "--- stderr ---"
            cat /tmp/windows-patch.err
          } > /tmp/windows-patch-debug.log
          git reset --hard HEAD
          cp /tmp/windows-patch-debug.log .windows-patch-debug.log
          rm .github/workflows/debug-windows-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- .github/workflows/debug-windows-patch.yml .windows-patch-debug.log
          git commit -m "chore: registra diagnóstico do patch de Windows"
          git push origin HEAD:${GITHUB_REF_NAME}
