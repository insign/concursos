          if set(new_ids).intersection(occurrences):
              raise SystemExit("computed new question IDs are not globally free")

          new_questions = []
          for new_id, (source_id, label, page_key, prompt, options, correct, rationale) in zip(new_ids, specs):
              new_questions.append({
                  "id": new_id,
                  "revision": 1,
                  "prompt": prompt,
                  "options": [{"id": oid, "text": text} for oid, text in options],
                  "correctOptionId": correct,
                  "explanation": f"{rationale} Fonte: questão adaptada de concurso real — {label}, {source_id}; consulta: {source_pages[page_key]}; adaptação: enunciado tornado autônomo e alternativas reescritas sem alterar o núcleo técnico.",
              })

          questions.extend(new_questions)
          data["questionSetRevision"] = int(data.get("questionSetRevision", 0)) + 1

          ids = [question["id"] for question in questions]
          if len(ids) != len(set(ids)):
              raise SystemExit("internal duplicate IDs after patch")
          if len(questions) != 90:
              raise SystemExit(f"expected 90 questions, found {len(questions)}")
          for question in questions:
              options = question.get("options", [])
              option_ids = [option.get("id") for option in options]
              if len(options) != 4 or len(option_ids) != len(set(option_ids)):
                  raise SystemExit(f"invalid options in {question['id']}")
              if question.get("correctOptionId") not in option_ids:
                  raise SystemExit(f"invalid correct option in {question['id']}")
              if "Fonte:" not in question.get("explanation", ""):
                  raise SystemExit(f"missing source in {question['id']}")

          lines = ["{", f'  "schemaVersion": {int(data["schemaVersion"])},', f'  "questionSetRevision": {int(data["questionSetRevision"])},', '  "questions": [']
          for index, question in enumerate(questions):
              suffix = "," if index < len(questions) - 1 else ""
              lines.append("    " + json.dumps(question, ensure_ascii=False, separators=(",", ":")) + suffix)
          lines.extend(["  ]", "}"])
          questions_path.write_text("\n".join(lines) + "\n", encoding="utf-8")

          after_occurrences, _ = global_ids_and_max()
          for new_id in new_ids:
              paths = after_occurrences.get(new_id, [])
              if paths != [questions_path]:
                  raise SystemExit(f"new ID {new_id} is not unique to Windows: {[str(path) for path in paths]}")

          proof = {
              "questionCount": len(questions),
              "newRange": [new_ids[0], new_ids[-1]],
              "questionSetRevision": data["questionSetRevision"],
