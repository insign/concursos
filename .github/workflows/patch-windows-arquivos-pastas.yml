name: Patch Windows arquivos pastas

on:
  push:
    branches:
      - agent/revisa-windows-arquivos-pastas

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply editorial patch
        shell: bash
        run: |
          python3 <<'PY'
          from collections import defaultdict
          from pathlib import Path
          import json
          import re
          import textwrap

          base = Path("src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-gerais/competencias-digitais-informatica-aplicada-setor-publico/windows-arquivos-pastas")
          content_path = base / "conteudo.md"
          cheat_path = base / "cheat-sheet.md"
          questions_path = base / "questoes.json"
          all_questions_root = Path("src/content/assuntos")

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected exactly one anchor, found {count}")
              return text.replace(old, new, 1)

          def replace_section(text: str, start: str, end: str, replacement: str, label: str) -> str:
              start_pos = text.find(start)
              if start_pos < 0:
                  raise SystemExit(f"{label}: start anchor not found")
              end_pos = text.find(end, start_pos)
              if end_pos < 0:
                  raise SystemExit(f"{label}: end anchor not found")
              return text[:start_pos] + replacement.rstrip() + text[end_pos:]

          content = content_path.read_text(encoding="utf-8")

          version_replacement = textwrap.dedent("""
          ## 1. Como estudar Windows quando o edital não indica versão

          O edital cobra Microsoft Windows sem indicar edição ou atualização. Este assunto usa o **Windows 11** como referência de interface e preserva os comportamentos básicos compartilhados com o Windows 10. Quando uma função depende de versão, configuração, unidade, sistema de arquivos ou política administrativa, essa condição é indicada.

          Em julho de 2026, a Microsoft mantém diferentes versões do Windows 11. Para prova, não é produtivo decorar números de compilação; é importante reconhecer o alcance de cada referência:

          | Referência | Como interpretar |
          |---|---|
          | **24H2** | versão ainda suportada e base de muitos ambientes existentes |
          | **25H2** | atualização ampla para computadores elegíveis e referência corrente para implantação em dispositivos existentes |
          | **26H1** | versão destinada a determinados dispositivos novos de 2026; não é oferecida como atualização local de 24H2 ou 25H2 |
          | **Windows 10** | aplicar quando o enunciado o mencionar ou quando o comportamento for transversal |
          | **versão expressa na questão** | sempre prevalece sobre a referência geral do material |

          Essa cautela evita três falhas comuns:

          - tratar aparência personalizável como regra absoluta;
          - transportar para o Windows 11 elemento visual específico do Windows 10;
          - presumir que toda versão mais nova é atualização geral para qualquer computador existente.

          O suporte gratuito regular do Windows 10 terminou em 14 de outubro de 2025, mas isso não tornou incorretos seus conceitos fundamentais de arquivo, pasta, janela, cópia, movimentação ou atalho.
          """)
          content = replace_section(
              content,
              "## 1. Como estudar Windows quando o edital não indica versão",
              "\n---\n\n## 2. Sistema operacional: conceito e funções",
              version_replacement,
              "version section",
          )

          menu_anchor = "A aparência pode mudar com atualizações e aplicativos instalados; a função do comando importa mais que a posição visual exata."
          tabs_block = menu_anchor + textwrap.dedent("""

          ### 5.3 Abas e escopo de navegação

          No Windows 11 atual, uma mesma janela do Explorador pode manter várias **abas**, cada uma exibindo uma pasta, unidade ou local diferente.

          - mudar de aba altera o local apresentado, não move os arquivos;
          - fechar uma aba não exclui nem fecha a pasta no sistema de arquivos;
          - `Ctrl + T` abre nova aba e a ativa;
          - `Ctrl + W` fecha a aba ativa e fecha a janela quando resta apenas uma aba;
          - `Ctrl + Tab` avança entre abas;
          - `Ctrl + Shift + Tab` retorna à aba anterior.

          Não confunda aba, janela e pasta. Uma aba é uma forma de visualizar um local; o local continua existindo independentemente da aba que o apresenta.
          """)
          content = replace_once(content, menu_anchor, tabs_block, "tabs section")

          naming_heading = "### 6.3 Propriedades, metadados e atributos"
          naming_block = textwrap.dedent(r"""
          ### 6.3 Regras de nomenclatura

          A interface comum do Windows impõe regras aos nomes de arquivos e pastas:

          | Regra | Consequência |
          |---|---|
          | caracteres reservados | não use `< > : " / \ | ? *` |
          | nomes de dispositivo | não use `CON`, `PRN`, `AUX`, `NUL`, `COM1` a `COM9` nem `LPT1` a `LPT9` |
          | extensão após nome reservado | `CON.txt` e `NUL.pdf` continuam inválidos na interface comum |
          | terminação | não termine o nome com espaço ou ponto |
          | mesmo nome em pastas diferentes | permitido, porque os caminhos são distintos |

          Caracteres como hífen, sublinhado, parênteses, espaço interno e `@` podem ser aceitos. A pergunta deve ser resolvida pelo conjunto completo do nome e pelo caminho, não pela aparência de um único caractere.

          ### 6.4 Propriedades, metadados e atributos
          """)
          content = replace_once(content, naming_heading, naming_block, "naming rules")

          content = replace_once(
              content,
              "### 7.4 Efeito básico sobre permissões NTFS",
              "### 7.4 Aprofundamento: efeito básico sobre permissões NTFS",
              "NTFS heading",
          )
          content = replace_once(
              content,
              "“Excluir permanentemente” na interface significa não usar a Lixeira; não é afirmação de impossibilidade absoluta de recuperação forense. Também não se deve confundir restaurar da Lixeira com desfazer uma cópia ou uma movimentação.",
              "**Aprofundamento:** “excluir permanentemente” na interface significa não usar a Lixeira; não prova impossibilidade absoluta de recuperação forense. Para a prova básica, retenha a distinção operacional entre `Delete`, `Shift + Delete`, Restaurar e Esvaziar Lixeira. Também não confunda restaurar da Lixeira com desfazer cópia ou movimentação.",
              "forensic note",
          )

          search_replacement = textwrap.dedent("""
          ## 9. Pesquisa, indexação, visualização e organização

          ### 9.1 Pesquisa e escopo

          A caixa de pesquisa trabalha no local ou escopo atual. Pesquisar em uma pasta, em **Este Computador**, em unidade externa ou em local de nuvem pode produzir conjuntos diferentes.

          A indexação acelera a localização ao manter catálogo de arquivos e propriedades. Conforme o tipo de arquivo, o manipulador disponível e a configuração, o índice também pode incluir conteúdo interno.

          | Configuração | Alcance geral |
          |---|---|
          | **Clássico** | indexa por padrão áreas comuns, como Documentos, Imagens, Músicas e Área de Trabalho |
          | **Aprimorado** | amplia a busca indexada para o computador, com exclusões configuráveis e maior uso de recursos |
          | propriedades apenas | considera nome, caminho e metadados suportados |
          | propriedades e conteúdo | também indexa texto interno de tipos compatíveis |

          Pontos de prova:

          - a pesquisa não se limita necessariamente ao nome;
          - ausência no índice não significa inexistência do arquivo;
          - item ainda pode ser encontrado por busca mais lenta ou em outro escopo;
          - conteúdo interno depende de formato, configuração e suporte;
          - pesquisa no Explorador não é sinônimo de pesquisa na Internet.

          ### 9.2 Partes da janela

          | Elemento | Função |
          |---|---|
          | barra de endereços | mostra ou recebe o caminho do local atual |
          | caixa de pesquisa | localiza itens no escopo atual |
          | painel de navegação | apresenta pastas, unidades e locais hierárquicos |
          | painel de conteúdo | lista os itens do local selecionado |
          | painel de visualização | mostra prévia compatível do item |
          | painel de detalhes | exibe propriedades e metadados |
          | barra de status | informa seleção e oferece controles de apresentação |

          ### 9.3 Modos de exibição

          | Exibição | Característica principal |
          |---|---|
          | Ícones | prioriza ícone ou miniatura em diferentes tamanhos |
          | Lista | apresentação compacta em sequência |
          | Detalhes | linhas e colunas de propriedades |
          | Conteúdo | combina nome com informações textuais do item |
          | Blocos | mostra ícones acompanhados de propriedades selecionadas |

          **Classificar** ordena; **agrupar** cria grupos visuais; **filtrar** restringe o conjunto mostrado; **alterar a exibição** muda a apresentação. Nenhuma dessas operações move fisicamente os arquivos.

          Atalhos úteis:

          - `Ctrl + E` ou `Ctrl + F`: caixa de pesquisa;
          - `Ctrl + L` ou `Alt + D`: barra de endereços;
          - `F3`: pesquisar arquivo ou pasta;
          - `F5`: atualizar a janela;
          - `Alt + P`: mostrar ou ocultar o painel de visualização;
          - `Alt + ←`, `Alt + →` e `Alt + ↑`: voltar, avançar e subir um nível.
          """)
          content = replace_section(
              content,
              "## 9. Pesquisa, classificação, agrupamento e visualização",
              "\n---\n\n## 10. Pastas compactadas e arquivos ZIP",
              search_replacement,
              "search section",
          )
          content = replace_once(
              content,
              "### 10.2 Limites e pegadinhas",
              "### 10.2 Dependências de versão e segurança",
              "archive heading",
          )

          cases_anchor = "Erika tenta primeiro fechar normalmente o programa, preservando a chance de salvar. Se ele permanecer travado, pode usar o Gerenciador de Tarefas, sabendo que finalizar o processo pode perder alterações não salvas."
          cases_block = cases_anchor + textwrap.dedent("""

          ### 13.6 Pesquisa indexada

          Fábio procura dentro de `C:\Processos` uma expressão presente no conteúdo de arquivos PDF. O resultado depende do escopo, da indexação, do tipo de arquivo e do manipulador capaz de extrair o texto. Não localizar a expressão na primeira busca não prova que os arquivos inexistam.

          ### 13.7 Abas do Explorador

          Gabriela abre `C:\Relatórios` em uma aba e `E:\Backup` em outra. Alternar entre elas não copia nem move itens. Fechar a aba de `E:\Backup` encerra apenas aquela visualização; a unidade e suas pastas permanecem.
          """)
          content = replace_once(content, cases_anchor, cases_block, "new cases")

          trap_anchor = "- A interface do Windows é personalizável; posição e visibilidade de elementos podem variar."
          trap_block = trap_anchor + textwrap.dedent(r"""
          - `< > : " / \ | ? *` não podem integrar nomes comuns de arquivos e pastas.
          - `CON.txt` continua usando nome reservado; a extensão não o neutraliza.
          - Fechar aba do Explorador não exclui a pasta exibida.
          - Pesquisa indexada não se limita necessariamente ao nome.
          - Ausência em resultado indexado não prova inexistência.
          - Mudar modo de exibição, classificar ou agrupar não move arquivos.
          - Precisar de 26H1 não significa que ela seja atualização geral de 24H2 ou 25H2.
          """)
          content = replace_once(content, trap_anchor, trap_block, "new traps")

          content = replace_once(
              content,
              "6. **Confira a versão:** o enunciado cita Windows 10, Windows 11 ou nenhum?",
              "6. **Confira a versão:** o enunciado cita Windows 10, Windows 11, 24H2, 25H2, 26H1 ou nenhuma versão?",
              "method version",
          )
          content = replace_once(
              content,
              "8. **Rejeite absolutos indevidos:** “sempre visível”, “todo arquivo”, “nunca recuperável” e “necessariamente encerra”.",
              "8. **Rejeite absolutos indevidos:** “sempre visível”, “todo arquivo”, “nunca recuperável” e “necessariamente encerra”.\n9. **Diferencie busca de existência:** escopo, índice e suporte ao formato condicionam o resultado.",
              "method search",
          )

          references = textwrap.dedent("""
          - MICROSOFT. [Windows 11 release information](https://learn.microsoft.com/en-us/windows/release-health/windows11-release-information). Versões 24H2, 25H2 e 26H1 e alcance específico da 26H1. Acesso em 19 jul. 2026.
          - MICROSOFT. [Naming Files, Paths, and Namespaces](https://learn.microsoft.com/en-us/windows/win32/fileio/naming-a-file). Caracteres proibidos, nomes reservados e terminações não aceitas pelo shell. Acesso em 19 jul. 2026.
          - MICROSOFT. [Search indexing in Windows](https://support.microsoft.com/en-us/windows/experience/performance-optimization/search-indexing-in-windows). Modos Clássico e Aprimorado, propriedades e conteúdo indexável. Acesso em 19 jul. 2026.
          - MICROSOFT. [Use a screen reader to explore and navigate File Explorer](https://support.microsoft.com/en-us/accessibility/windows/use-a-screen-reader-to-explore-and-navigate-file-explorer-in-windows). Abas, painéis, barra de status e navegação no Explorador do Windows 11. Acesso em 19 jul. 2026.
          """).strip()
          content = content.rstrip() + "\n" + references + "\n"
          content_path.write_text(content, encoding="utf-8")

          cheat = textwrap.dedent(r"""
          # Microsoft Windows: revisão rápida

          ## 1. Versão e objetos

          | Item | Regra |
          |---|---|
          | Windows | sistema operacional |
          | Explorador de Arquivos | aplicativo para navegar e gerenciar itens |
          | arquivo | unidade de informação identificada por nome e caminho |
          | pasta | contêiner hierárquico |
          | atalho | referência; não é cópia do destino |
          | ícone fixado | acesso conveniente; não instala nem duplica |

          - A versão citada na questão prevalece.
          - 24H2 e 25H2 atendem computadores existentes; 26H1 é voltada a certos dispositivos novos e não é atualização local geral.
          - Fechar janela não garante encerrar todo processo em segundo plano.

          ## 2. Interface e Explorador

          | Recurso | Função |
          |---|---|
          | Área de trabalho | superfície principal; `Win + D` mostra ou oculta |
          | Menu Iniciar | pesquisa, aplicativos, arquivos, conta, configurações e energia |
          | Barra de tarefas | inicia e alterna apps; fixado ≠ em execução |
          | `Win + A` | Configurações Rápidas no Windows 11 |
          | `Win + N` | notificações e calendário no Windows 11 |
          | `Alt + Tab` | alterna janelas |
          | `Win + Tab` | Visão de Tarefas |
          | `Win + E` | abre o Explorador |

          Partes do Explorador:

          - barra de endereços = caminho;
          - caixa de pesquisa = busca no escopo atual;
          - painel de navegação = árvore de locais;
          - painel de conteúdo = itens do local;
          - painel de visualização = prévia;
          - painel de detalhes = propriedades;
          - barra de status = seleção e controles de apresentação.

          Abas:

          - `Ctrl + T`: nova aba;
          - `Ctrl + W`: fecha aba ativa; fecha a janela se for a única;
          - `Ctrl + Tab`: próxima aba;
          - `Ctrl + Shift + Tab`: aba anterior;
          - fechar aba não exclui a pasta.

          ## 3. Caminhos, nomes, extensões e pesquisa

          Exemplo: `C:\Users\Ana\Documentselatorio.docx`

          - `C:` = unidade; `C:\` = raiz; `\` separa níveis;
          - mesmo nome pode existir em caminhos diferentes;
          - trocar `.txt` por `.pdf` não converte o conteúdo;
          - extensão pode estar oculta e não prova segurança.

          Nomes:

          | Regra | Exemplos |
          |---|---|
          | proibidos | `< > : " / \ | ? *` |
          | reservados | `CON`, `PRN`, `AUX`, `NUL`, `COM1`–`COM9`, `LPT1`–`LPT9` |
          | extensão não neutraliza | `CON.txt` continua inválido |
          | terminação | não encerrar por espaço ou ponto |

          Pesquisa e indexação:

          - o escopo atual importa;
          - modo Clássico indexa áreas comuns; Aprimorado amplia o alcance;
          - índice pode conter nome, caminho, propriedades e conteúdo compatível;
          - ausência no índice ≠ inexistência;
          - `Ctrl + E`/`Ctrl + F`: pesquisa; `Ctrl + L`/`Alt + D`: endereço.

          Exibições:

          - Ícones = miniatura/ícone;
          - Lista = apresentação compacta;
          - Detalhes = linhas e colunas;
          - Conteúdo/Blocos = nome com propriedades;
          - classificar, agrupar, filtrar ou mudar exibição não move arquivos.

          ## 4. Selecionar, copiar, mover e excluir

          | Seleção | Resultado |
          |---|---|
          | clique | um item |
          | `Ctrl` + clique | itens não contíguos |
          | `Shift` + clique | intervalo contíguo |
          | `Ctrl + A` | todos os itens da área ativa |

          | Operação | Atalho |
          |---|---|
          | copiar | `Ctrl + C` |
          | recortar | `Ctrl + X` |
          | colar | `Ctrl + V` |
          | desfazer | `Ctrl + Z` |
          | nova pasta | `Ctrl + Shift + N` |
          | renomear | `F2` |
          | propriedades | `Alt + Enter` |

          Arrastar e soltar:

          | Origem/destino | Sem tecla | `Shift` | `Ctrl` | `Ctrl + Shift` |
          |---|---|---|---|---|
          | mesmo volume | mover | mover | copiar | criar atalho |
          | volumes diferentes | copiar | mover | copiar | criar atalho |

          Lixeira:

          - `Delete`/`Ctrl + D`: envia normalmente à Lixeira;
          - `Shift + Delete`: exclui sem Lixeira;
          - Restaurar retorna, em regra, ao local original;
          - rede, mídia removível, tamanho e configuração podem mudar o comportamento;
          - sem Lixeira não significa irrecuperável em sentido forense.

          ## 5. Compactação e programas

          - ZIP reúne e pode reduzir tamanho; não é sinônimo de criptografia.
          - JPEG e outros formatos já comprimidos podem reduzir pouco.
          - Windows 11 24H2 oferece suporte nativo a ZIP, RAR, 7z e TAR, mas não a todo arquivo criptografado.
          - instalar ≠ fixar ≠ criar atalho;
          - desafixar ou apagar atalho não desinstala;
          - mudar aplicativo padrão não converte arquivos;
          - `Ctrl + Shift + Esc` abre o Gerenciador de Tarefas;
          - Finalizar tarefa pode causar perda de dados não salvos;
          - `Win + L` bloqueia sem encerrar a sessão.

          **Aprofundamento NTFS:** mover no mesmo volume tende a preservar permissões; copiar ou mover para outro volume tende a herdar as permissões do destino.

          ## 6. Pegadinhas e método

          - Explorador ≠ Windows.
          - Atalho ≠ cópia.
          - Fixar ≠ instalar.
          - Minimizar ≠ encerrar.
          - Renomear extensão ≠ converter.
          - Oculto ≠ criptografado.
          - Pesquisa sem resultado ≠ arquivo inexistente.
          - Fechar aba ≠ excluir pasta.
          - Classificar/agrupar ≠ mover.
          - ZIP ≠ criptografia.
          - Dado em Lixeira ≠ já apagado do local original e irrecuperável.

          Sequência: **objeto → operação → origem/destino → tecla → versão → configuração → efeito real**.
          """).lstrip()
          cheat_path.write_text(cheat, encoding="utf-8")

          data = json.loads(questions_path.read_text(encoding="utf-8"))
          questions = data["questions"]
          by_id = {question["id"]: question for question in questions}
          if len(by_id) != len(questions):
              raise SystemExit("internal duplicate IDs before patch")

          def update_question(qid: str, prompt: str, options: list[tuple[str, str]], correct: str, explanation: str) -> None:
              question = by_id[qid]
              question["revision"] = int(question["revision"]) + 1
              question["prompt"] = prompt
              question["options"] = [{"id": oid, "text": text} for oid, text in options]
              question["correctOptionId"] = correct
              question["explanation"] = explanation

          update_question(
              "q3879",
              "Um órgão precisa executar aplicativos, controlar memória e dispositivos e organizar arquivos em unidades. Qual componente oferece esses serviços básicos?",
              [("A", "O sistema operacional Microsoft Windows."), ("B", "Um atalho fixado na barra de tarefas."), ("C", "A extensão associada ao documento."), ("D", "O painel de visualização do Explorador.")],
              "A",
              "O sistema operacional gerencia recursos e oferece serviços comuns aos aplicativos e ao usuário. Fonte: questão autoral baseada nas referências do conteúdo.",
          )
          update_question(
              "q3880",
              "Ao abrir o Explorador de Arquivos para localizar um processo, o servidor está usando",
              [("A", "o próprio sistema operacional, sem aplicativo intermediário."), ("B", "um aplicativo do Windows que navega e gerencia arquivos e pastas."), ("C", "um formato de arquivo associado à unidade."), ("D", "um dispositivo físico de armazenamento.")],
              "B",
              "O Explorador é aplicativo integrado ao Windows; não é sinônimo de sistema operacional ou dispositivo. Fonte: questão autoral baseada nas referências do conteúdo.",
          )
          update_question(
              "q3881",
              "Um atalho da área de trabalho passou a informar que o destino não foi encontrado. A explicação mais provável é:",
              [("A", "O atalho converteu o destino para outro formato."), ("B", "O destino foi movido, renomeado ou removido, embora o arquivo de atalho permaneça."), ("C", "Todo atalho perde validade quando o Windows reinicia."), ("D", "O atalho necessariamente desinstalou o programa apontado.")],
              "B",
              "Atalho é referência. Alterações no destino podem quebrar o vínculo sem transformar o atalho em cópia. Fonte: questão autoral baseada nas referências do conteúdo.",
          )
          update_question(
              "q3882",
              "Depois de desafixar um aplicativo da barra de tarefas, ele ainda aparece em Aplicativos instalados. Isso ocorre porque desafixar",
              [("A", "remove apenas o acesso fixado, não a instalação."), ("B", "desinstala o executável, mas preserva o cadastro."), ("C", "move o programa para a Lixeira."), ("D", "cria uma segunda instalação invisível.")],
              "A",
              "Fixação é recurso de interface; desinstalação exige procedimento próprio. Fonte: questão autoral baseada nas referências do conteúdo.",
          )
          update_question(
              "q3883",
              "Após pressionar `Win + D`, todas as janelas deixaram de aparecer, mas continuaram acessíveis pela barra de tarefas. O atalho",
              [("A", "encerrou todos os aplicativos."), ("B", "alternou a exibição da área de trabalho sem fechar as janelas."), ("C", "moveu as janelas para outra conta."), ("D", "finalizou os processos em segundo plano.")],
              "B",
              "`Win + D` mostra ou oculta a área de trabalho; as janelas permanecem abertas. Fonte: questão autoral baseada nas referências do conteúdo.",
          )
          update_question(
              "q3884",
              "Sobre versões atuais do Windows 11, assinale a afirmação correta.",
              [("A", "26H1 é atualização local geral oferecida a todos os computadores 24H2 e 25H2."), ("B", "25H2 deixou de receber atualizações quando 26H1 foi lançada."), ("C", "26H1 atende determinados dispositivos novos e não é atualização local de 24H2 ou 25H2."), ("D", "A versão indicada no enunciado pode ser ignorada se a interface parecer semelhante.")],
              "C",
              "A Microsoft delimita a 26H1 a novos dispositivos específicos; 24H2 e 25H2 seguem a cadência de dispositivos existentes. Fonte: questão autoral baseada na documentação oficial da Microsoft.",
          )
          update_question(
              "q3885",
              "Na barra de tarefas, um aplicativo fixado não apresenta indicador de execução. Isso permite concluir apenas que",
