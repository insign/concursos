              ("Q4162186", "Instituto Legalle, Prefeitura de Progresso, 2026", "shortcuts", "No comportamento padrão, `Win + 1`", [("A", "abre ou alterna para o primeiro aplicativo fixado na barra de tarefas."), ("B", "cria a primeira pasta do volume."), ("C", "renomeia o item para 1."), ("D", "abre a primeira aba do navegador necessariamente.")], "A", "A combinação usa a posição do aplicativo fixado na barra de tarefas."),
