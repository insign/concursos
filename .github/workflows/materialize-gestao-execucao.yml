name: Inspect gestão aplicada da execução contratual package

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: inspect-gestao-execucao-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  inspect:
    name: Inspect gestão aplicada package
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Inspect and persist package diagnostics
        shell: bash
        run: |
          python3 - <<'PY' > .github/gestao-execucao-inspect.txt 2>&1
          import base64
          import bz2
          import hashlib
          import json
          import traceback
          from pathlib import Path

          parts = [Path(f'.github/gestao-execucao-bundle.part{i}') for i in range(1, 6)]
          segments = []
          for path in parts:
              segment = ''.join(path.read_text(encoding='utf-8').split())
              segments.append(segment)
              print(path, 'chars=', len(segment), 'sha256=', hashlib.sha256(segment.encode()).hexdigest())

          payload = ''.join(segments)
          print('payload chars=', len(payload), 'sha256=', hashlib.sha256(payload.encode()).hexdigest())
          try:
              compressed = base64.b64decode(payload, validate=True)
              print('compressed bytes=', len(compressed), 'sha256=', hashlib.sha256(compressed).hexdigest())
              raw = bz2.decompress(compressed)
              print('raw bytes=', len(raw), 'sha256=', hashlib.sha256(raw).hexdigest())
              bundle = json.loads(raw.decode('utf-8'))
              print('keys=', sorted(bundle))
              print('insertions=', sorted(bundle.get('insertions', {})))
              print('cheat chars=', len(bundle.get('cheat', '')))
              print('questions=', len(bundle.get('questions', [])))
              if bundle.get('questions'):
                  print('first id=', bundle['questions'][0].get('id'))
                  print('last id=', bundle['questions'][-1].get('id'))
          except Exception:
              traceback.print_exc()
          PY

          cat .github/gestao-execucao-inspect.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/gestao-execucao-inspect.txt
          if ! git diff --cached --quiet; then
            git commit -m 'ci: inspeciona pacote de gestão aplicada'
            git push origin HEAD:${{ github.head_ref }}
          fi
          exit 1
