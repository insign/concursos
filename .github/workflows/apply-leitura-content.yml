name: Apply leitura content update

on:
  push:
    branches:
      - agent/melhora-leitura-interpretacao
    paths:
      - .automation/leitura/run

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply content payload
        shell: bash
        run: |
          set -euo pipefail
          target='src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-gerais/lingua-portuguesa/leitura-interpretacao-tipos-generos'
          cp .automation/leitura/conteudo.md "$target/conteudo.md"
          cp .automation/leitura/cheat-sheet.md "$target/cheat-sheet.md"
          node <<'NODE'
          const fs = require('node:fs');
          const target = 'src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-gerais/lingua-portuguesa/leitura-interpretacao-tipos-generos/questoes.json';
          const current = JSON.parse(fs.readFileSync(target, 'utf8'));
          const additions = JSON.parse(fs.readFileSync('.automation/leitura/additions.json', 'utf8'));
          const ids = new Set(current.questions.map((question) => question.id));
          for (const question of additions) {
            if (ids.has(question.id)) throw new Error(`ID duplicado: ${question.id}`);
            if (!Array.isArray(question.options) || question.options.length < 2) throw new Error(`Opções inválidas: ${question.id}`);
            if (!question.options.some((option) => option.id === question.correctOptionId)) throw new Error(`Gabarito inválido: ${question.id}`);
            ids.add(question.id);
          }
          current.questionSetRevision = 3;
          current.questions.push(...additions);
          if (current.questions.length !== 74) throw new Error(`Quantidade inesperada: ${current.questions.length}`);
          fs.writeFileSync(target, `${JSON.stringify(current, null, 2)}\n`);
          NODE
          rm -rf .automation/leitura
          rm .github/workflows/apply-leitura-content.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Melhora leitura e adiciona questões reais'
          git push
