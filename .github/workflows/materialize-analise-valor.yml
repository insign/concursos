name: Materialize análise do valor e alienação review

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: materialize-analise-valor-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  materialize:
    name: Materialize análise do valor e alienação review
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Materialize reviewed subject files
        shell: bash
        run: |
          python3 .github/patch-analise-valor.py

          target='src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-especificos/administracao-recursos-materiais-patrimoniais/analise-valor-alienacao'
          if ! git diff --quiet -- "$target"; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add "$target/conteudo.md" "$target/cheat-sheet.md" "$target/questoes.json"
            git commit -m 'content: aprofunda análise do valor e alienação'
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Run Astro checks
        shell: bash
        run: |
          set +e
          npm run check > /tmp/analise-valor-check.log 2>&1
          status=$?
          set -e
          cat /tmp/analise-valor-check.log

          if [ "$status" -ne 0 ]; then
            cp /tmp/analise-valor-check.log .github/analise-valor-diagnostic.txt
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add .github/analise-valor-diagnostic.txt
            if ! git diff --cached --quiet; then
              git commit -m 'ci: registra diagnóstico de análise do valor'
              git push origin HEAD:${{ github.head_ref }}
            fi
            exit "$status"
          fi

      - name: Build production site
        run: npm run build
