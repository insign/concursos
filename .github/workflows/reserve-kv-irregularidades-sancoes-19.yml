name: Complete irregularidades, penalidades e sanções in KV

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  complete-kv:
    name: Mark analyzed subject as done
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate current state and mark subject done
        shell: bash
        run: |
          set -euo pipefail
          key='tce-ma-2026-analista-administracao--irregularidades-penalidades-sancoes'
          path='/concursos/tce-ma-2026-analista-administracao/irregularidades-penalidades-sancoes/'

          curl --fail-with-body --silent --show-error \
            'https://kv.helio.me/adm' > /tmp/adm-before.json

          action="$(python3 - "$key" "$path" <<'PY'
          import json
          import sys

          key, path = sys.argv[1:]
          analyzing = {'path': path, 'status': 'analyzing'}
          done = {'path': path, 'status': 'done'}
          with open('/tmp/adm-before.json', encoding='utf-8') as stream:
              document = json.load(stream)
          item = document.get('json', {}).get('links', {}).get(key)
          print('KV_VERSION_BEFORE', document.get('version'), file=sys.stderr)
          print('CURRENT_ITEM', item, file=sys.stderr)
          if item == done:
              print('already-done')
          elif item == analyzing:
              print('mutate')
          else:
              raise SystemExit(f'UNEXPECTED_CURRENT_ITEM:{item!r}')
          PY
          )"

          if [[ "$action" == 'mutate' ]]; then
            cat > /tmp/payload.json <<JSON
          {
            "path": "$path",
            "status": "done"
          }
          JSON

            curl --fail-with-body --silent --show-error \
              -X PUT \
              -H 'Content-Type: application/json' \
              --data @/tmp/payload.json \
              "https://kv.helio.me/adm/value?path=%2Flinks%2F${key}" \
              > /tmp/mutation.json

            python3 - "$key" "$path" <<'PY'
          import json
          import sys

          key, path = sys.argv[1:]
          expected = {'path': path, 'status': 'done'}
          with open('/tmp/mutation.json', encoding='utf-8') as stream:
              document = json.load(stream)
          item = document['json']['links'][key]
          print('MUTATION_ITEM', item)
          print('KV_VERSION_AFTER_MUTATION', document.get('version'))
          if item != expected:
              raise SystemExit(1)
          PY
          else
            echo 'KV item was already done; no mutation needed.'
          fi

      - name: Verify persisted value
        shell: bash
        run: |
          set -euo pipefail
          key='tce-ma-2026-analista-administracao--irregularidades-penalidades-sancoes'
          path='/concursos/tce-ma-2026-analista-administracao/irregularidades-penalidades-sancoes/'
          curl --fail-with-body --silent --show-error \
            'https://kv.helio.me/adm' > /tmp/adm-after.json
          python3 - "$key" "$path" <<'PY'
          import json
          import sys

          key, path = sys.argv[1:]
          expected = {'path': path, 'status': 'done'}
          with open('/tmp/adm-after.json', encoding='utf-8') as stream:
              document = json.load(stream)
          item = document['json']['links'][key]
          print('PERSISTED_ITEM', item)
          print('KV_VERSION_PERSISTED', document.get('version'))
          if item != expected:
              raise SystemExit(1)
          PY
