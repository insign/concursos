name: Finalize communication content in KV

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  finalize-kv:
    name: Mark communication content as done
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Mark communication subject as done
        shell: bash
        run: |
          key='tce-ma-2026-analista-administracao--comunicacao-processo-organizacional'
          path_value='/concursos/tce-ma-2026-analista-administracao/comunicacao-processo-organizacional/'
          pointer='%2Flinks%2Ftce-ma-2026-analista-administracao--comunicacao-processo-organizacional%2Fstatus'

          curl --fail-with-body --silent --show-error \
            -X PUT \
            -H 'Content-Type: application/json' \
            --data '"done"' \
            "https://kv.helio.me/adm/value?path=${pointer}" \
            > /tmp/mutation.json

          python3 - <<'PY'
          import json
          key = 'tce-ma-2026-analista-administracao--comunicacao-processo-organizacional'
          expected = {
              'path': '/concursos/tce-ma-2026-analista-administracao/comunicacao-processo-organizacional/',
              'status': 'done',
          }
          with open('/tmp/mutation.json', encoding='utf-8') as stream:
              document = json.load(stream)
          item = document['json']['links'][key]
          print('MUTATION_ITEM', item)
          print('KV_VERSION_AFTER_MUTATION', document.get('version'))
          if item != expected:
              raise SystemExit(1)
          PY

      - name: Verify persisted value
        shell: bash
        run: |
          curl --fail-with-body --silent --show-error 'https://kv.helio.me/adm' > /tmp/adm-after.json
          python3 - <<'PY'
          import json
          key = 'tce-ma-2026-analista-administracao--comunicacao-processo-organizacional'
          expected = {
              'path': '/concursos/tce-ma-2026-analista-administracao/comunicacao-processo-organizacional/',
              'status': 'done',
          }
          with open('/tmp/adm-after.json', encoding='utf-8') as stream:
              document = json.load(stream)
          item = document['json']['links'][key]
          print('PERSISTED_ITEM', item)
          print('KV_VERSION_PERSISTED', document.get('version'))
          if item != expected:
              raise SystemExit(1)
          PY
