name: Reserve next specific content in KV

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  reserve-kv:
    name: Select and mark next specific content as analyzing
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Select first available specific subject
        shell: bash
        run: |
          curl --fail-with-body --silent --show-error 'https://kv.helio.me/adm' > /tmp/adm.json
          python3 - <<'PY'
          import json
          from urllib.parse import quote

          candidates = [
              ('tce-ma-2026-analista-administracao--comunicacao-processo-organizacional', '/concursos/tce-ma-2026-analista-administracao/comunicacao-processo-organizacional/'),
              ('tce-ma-2026-analista-administracao--controle-avaliacao-processo-organizacional', '/concursos/tce-ma-2026-analista-administracao/controle-avaliacao-processo-organizacional/'),
              ('tce-ma-2026-analista-administracao--gestao-processos', '/concursos/tce-ma-2026-analista-administracao/gestao-processos/'),
              ('tce-ma-2026-analista-administracao--gestao-qualidade-excelencia-servicos-publicos', '/concursos/tce-ma-2026-analista-administracao/gestao-qualidade-excelencia-servicos-publicos/'),
              ('tce-ma-2026-analista-administracao--gestao-projetos', '/concursos/tce-ma-2026-analista-administracao/gestao-projetos/'),
              ('tce-ma-2026-analista-administracao--planejamento-estrategico', '/concursos/tce-ma-2026-analista-administracao/planejamento-estrategico/'),
              ('tce-ma-2026-analista-administracao--empreendedorismo-governamental-novas-liderancas', '/concursos/tce-ma-2026-analista-administracao/empreendedorismo-governamental-novas-liderancas/'),
              ('tce-ma-2026-analista-administracao--gestao-resultados-publica-privada-cliente', '/concursos/tce-ma-2026-analista-administracao/gestao-resultados-publica-privada-cliente/'),
          ]

          with open('/tmp/adm.json', encoding='utf-8') as stream:
              document = json.load(stream)
          links = document.get('json', {}).get('links', {})
          print('KV_VERSION_BEFORE', document.get('version'))

          for key, path in candidates:
              item = links.get(key)
              status = item.get('status') if isinstance(item, dict) else None
              print('CANDIDATE', key, status or 'absent', item)

              malformed_reservation = (
                  isinstance(item, dict)
                  and item.get('key') == key
                  and item.get('path') == path
                  and item.get('status') == 'analyzing'
              )
              if status == 'done':
                  continue
              if status == 'analyzing' and not malformed_reservation:
                  continue

              selected = {'key': key, 'path': path}
              payload = {'path': path, 'status': 'analyzing'}
              with open('/tmp/selected.json', 'w', encoding='utf-8') as out:
                  json.dump(selected, out, ensure_ascii=False)
              with open('/tmp/payload.json', 'w', encoding='utf-8') as out:
                  json.dump(payload, out, ensure_ascii=False)
              with open('/tmp/selected.env', 'w', encoding='utf-8') as out:
                  out.write(f"KEY={key}\n")
                  out.write(f"POINTER={quote('/links/' + key, safe='')}\n")
              print('SELECTED_KEY', key)
              print('SELECTED_PATH', path)
              print('REPAIRING_MALFORMED_RESERVATION', malformed_reservation)
              break
          else:
              raise SystemExit('no available specific subject found')
          PY

      - name: Mark selected subject as analyzing
        shell: bash
        run: |
          source /tmp/selected.env
          curl --fail-with-body --silent --show-error \
            -X PUT \
            -H 'Content-Type: application/json' \
            --data @/tmp/payload.json \
            "https://kv.helio.me/adm/value?path=${POINTER}" \
            > /tmp/mutation.json
          python3 - <<'PY'
          import json
          with open('/tmp/selected.json', encoding='utf-8') as stream:
              selected = json.load(stream)
          expected = {'path': selected['path'], 'status': 'analyzing'}
          with open('/tmp/mutation.json', encoding='utf-8') as stream:
              document = json.load(stream)
          item = document['json']['links'][selected['key']]
          print('MUTATION_ITEM', item)
          print('KV_VERSION_AFTER_MUTATION', document.get('version'))
          if item != expected:
              raise SystemExit(1)
          PY

      - name: Verify persisted value
        shell: bash
        run: |
          curl --fail-with-body --silent --show-error 'https://kv.helio.me/adm' > /tmp/adm-after.json
          python3 - <<'PY'
          import json
          with open('/tmp/selected.json', encoding='utf-8') as stream:
              selected = json.load(stream)
          expected = {'path': selected['path'], 'status': 'analyzing'}
          with open('/tmp/adm-after.json', encoding='utf-8') as stream:
              document = json.load(stream)
          item = document['json']['links'][selected['key']]
          print('PERSISTED_ITEM', item)
          print('KV_VERSION_PERSISTED', document.get('version'))
          if item != expected:
              raise SystemExit(1)
          PY
