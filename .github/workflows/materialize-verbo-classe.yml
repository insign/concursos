name: Materialize verbo como classe review

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: materialize-verbo-classe-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  materialize:
    name: Materialize verbo como classe review
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out pull request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Materialize reviewed subject files
        shell: bash
        run: |
          python3 .github/patch-verbo-classe.py

          target='src/content/assuntos/tce-ma-2026-analista-administracao/conhecimentos-gerais/lingua-portuguesa/verbo-como-classe-de-palavras'
          if ! git diff --quiet -- "$target"; then
            git config user.name github-actions[bot]
            git config user.email 41898282+github-actions[bot]@users.noreply.github.com
            git add "$target/conteudo.md" "$target/cheat-sheet.md" "$target/questoes.json"
            git commit -m 'content: aprofunda verbo como classe de palavras'
            git push origin HEAD:${{ github.head_ref }}
          fi
