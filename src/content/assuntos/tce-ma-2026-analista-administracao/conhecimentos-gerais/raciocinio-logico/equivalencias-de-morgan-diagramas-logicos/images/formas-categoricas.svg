<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" role="img" aria-labelledby="title desc">
  <title id="title">Quatro formas de proposições categóricas</title>
  <desc id="desc">Painéis mostram todo A é B com a região de A fora de B vazia, nenhum A é B com a interseção vazia, algum A é B com X na interseção e algum A não é B com X na região exclusiva de A.</desc>
  <defs>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="12" height="12" fill="#e9f0ef" />
      <line x1="0" y1="0" x2="0" y2="12" stroke="#47727a" stroke-width="4" />
    </pattern>
    <clipPath id="clip-none-a">
      <circle cx="690" cy="180" r="86" />
    </clipPath>
  </defs>

  <g fill="#fffdf8" stroke="#cad7d5" stroke-width="2">
    <rect x="20" y="20" width="470" height="280" rx="16" />
    <rect x="510" y="20" width="470" height="280" rx="16" />
    <rect x="20" y="320" width="470" height="280" rx="16" />
    <rect x="510" y="320" width="470" height="280" rx="16" />
  </g>

  <g fill="#17323b" font-family="system-ui, sans-serif" text-anchor="middle">
    <text x="255" y="55" font-size="23" font-weight="700">Todo A é B</text>
    <text x="745" y="55" font-size="23" font-weight="700">Nenhum A é B</text>
    <text x="255" y="355" font-size="23" font-weight="700">Algum A é B</text>
    <text x="745" y="355" font-size="23" font-weight="700">Algum A não é B</text>
  </g>

  <g stroke="#1f4c5c" stroke-width="4">
    <circle cx="200" cy="180" r="86" fill="url(#hatch)" />
    <circle cx="310" cy="180" r="86" fill="#fffdf8" />
    <circle cx="200" cy="180" r="86" fill="none" />
    <circle cx="310" cy="180" r="86" fill="none" />
  </g>
  <g fill="#17323b" font-family="system-ui, sans-serif" font-size="20" font-weight="700" text-anchor="middle">
    <text x="165" y="105">A</text>
    <text x="345" y="105">B</text>
    <text x="255" y="282" font-size="17" font-weight="400">A região A fora de B está vazia.</text>
  </g>

  <g stroke="#1f4c5c" stroke-width="4">
    <circle cx="690" cy="180" r="86" fill="#fffdf8" />
    <circle cx="800" cy="180" r="86" fill="#fffdf8" />
    <circle cx="800" cy="180" r="86" fill="url(#hatch)" clip-path="url(#clip-none-a)" />
    <circle cx="690" cy="180" r="86" fill="none" />
    <circle cx="800" cy="180" r="86" fill="none" />
  </g>
  <g fill="#17323b" font-family="system-ui, sans-serif" font-size="20" font-weight="700" text-anchor="middle">
    <text x="655" y="105">A</text>
    <text x="835" y="105">B</text>
    <text x="745" y="282" font-size="17" font-weight="400">A interseção entre A e B está vazia.</text>
  </g>

  <g fill="#fffdf8">
    <circle cx="200" cy="480" r="86" />
    <circle cx="310" cy="480" r="86" />
  </g>
  <g fill="none" stroke="#1f4c5c" stroke-width="4">
    <circle cx="200" cy="480" r="86" />
    <circle cx="310" cy="480" r="86" />
  </g>
  <g fill="#17323b" font-family="system-ui, sans-serif" text-anchor="middle">
    <text x="165" y="405" font-size="20" font-weight="700">A</text>
    <text x="345" y="405" font-size="20" font-weight="700">B</text>
    <text x="255" y="494" font-size="34" font-weight="800">X</text>
    <text x="255" y="582" font-size="17">Existe objeto na interseção.</text>
  </g>

  <g fill="#fffdf8">
    <circle cx="690" cy="480" r="86" />
    <circle cx="800" cy="480" r="86" />
  </g>
  <g fill="none" stroke="#1f4c5c" stroke-width="4">
    <circle cx="690" cy="480" r="86" />
    <circle cx="800" cy="480" r="86" />
  </g>
  <g fill="#17323b" font-family="system-ui, sans-serif" text-anchor="middle">
    <text x="655" y="405" font-size="20" font-weight="700">A</text>
    <text x="835" y="405" font-size="20" font-weight="700">B</text>
    <text x="650" y="494" font-size="34" font-weight="800">X</text>
    <text x="745" y="582" font-size="17">Existe objeto em A e fora de B.</text>
  </g>
</svg>
